<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.list-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 1 Unit 1</h2>

<div class="top">
<a class="list-btn" href="./index.html">← 챕터 목록</a>
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["spread","전파하다, 확산시키다"],
["similarly","유사하게, 마찬가지로"],
["factor","요인"],
["require","필요로 하다"],
["limit","한계"],
["create","창조하다"],
["eventually","결국"],
["device","장치"],
["various","여러가지의, 다양한"],
["stream","스트리밍하다, (영상을) 재생하다"],
["common","흔한, 공통의"],
["opportunity","기회"],
["result","결과"],
["educational","교육의"],
["animated","만화 영화로 된"],
["target","겨냥하다"],
["actually","실제로"],
["encourage","격려하다, 권장하다"],
["audience","시청자, 독자"],
["life-changing","인생을 바꿀만한"],
["career","직업"],
["platform","플랫폼"],
["consume","소비하다"],
["industry","산업"],
["accessible","접근 가능한, 다가가기 쉬운"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>

</html>
