<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Practice</title>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  color:#111;
  padding:20px;
}

.page{
  width:100%;
}

h2{
  margin:0 0 12px 0;
  font-size:28px;
  line-height:1.2;
}

/* 상단 고정 */
.top-wrap{
  position:sticky;
  top:0;
  z-index:100;
  background:#f5f6fa;
  padding:8px 0 14px 0;
  margin-bottom:10px;
}

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* 버튼 공통 */
.btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:8px 12px;
  font-size:14px;
  line-height:1.2;
  text-decoration:none;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn:hover{
  background:#fafafa;
}

/* 카드 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:14px;
  align-items:start;
}

.card{
  background:#fff;
  border:1px solid #e3e3e3;
  border-radius:16px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-width:0;
  cursor:pointer;
}

.left{
  display:flex;
  gap:10px;
  min-width:0;
  flex:1;
}

.num{
  color:#666;
  font-size:14px;
  flex:0 0 auto;
  line-height:1.4;
}

.text-box{
  min-width:0;
  flex:1;
}

.word{
  font-size:18px;
  font-weight:700;
  line-height:1.25;
  word-break:normal;
  overflow-wrap:normal;
  white-space:normal;
}

.meaning{
  margin-top:4px;
  color:#555;
  font-size:14px;
  line-height:1.35;
  word-break:keep-all;
}

.word.hidden-text{
  visibility:hidden;
}

.meaning.hidden-text{
  display:none;
}

/* 긴 한 단어용: 중간 줄바꿈 방지 + 글자 살짝 축소 */
.word.long-single{
  white-space:nowrap;
  font-size:16px;
}

.speak-btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  border-radius:10px;
  width:46px;
  height:36px;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  flex:0 0 auto;
}

.speak-btn:hover{
  background:#fafafa;
}

/* 하단 다음 버튼 */
.bottom-nav{
  display:flex;
  justify-content:flex-end;
  margin-top:16px;
}

.next-btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  color:#111;
  border-radius:14px;
  padding:14px 18px;
  font-size:16px;
  line-height:1.2;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.next-btn:hover{
  background:#fafafa;
}

/* 태블릿 */
@media (max-width:1024px){
  .grid{
    grid-template-columns:repeat(3, minmax(0, 1fr));
  }
}

/* 모바일 */
@media (max-width:600px){
  body{
    padding:14px;
  }

  h2{
    font-size:24px;
  }

  .grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
  }

  .card{
    padding:12px;
  }

  .word{
    font-size:16px;
  }

  .word.long-single{
    font-size:14px;
  }

  .meaning{
    font-size:13px;
  }

  .speak-btn{
    width:40px;
    height:34px;
    font-size:16px;
  }

  .next-btn{
    font-size:15px;
    padding:12px 16px;
  }
}
</style>
</head>
<body>

<div class="page">
  <h2>Chapter 2 Unit 1</h2>

  <div class="top-wrap">
    <div class="top">
      <a class="btn" href="./index.html">← 챕터 목록</a>
      <button type="button" class="btn" id="meaningBtn">뜻 숨기기</button>
      <button type="button" class="btn" id="wordBtn">영어 숨기기</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-nav">
    <a class="next-btn" href="./ch2un2.html">▶ 다음 Unit 보기</a>
  </div>
</div>

<script>
const vocabList = [
["fake","가짜의, 거짓된"],
["exactly","정확히"],
["inform","알리다"],
["purpose","목적, 의도"],
["influence","영향을 주다"],
["opinion","의견, 견해"],
["twist","(사실 따위를) 왜곡하다"],
["interpret","이해하다"],
["publish","출판하다, 발표하다"],
["socially","사회적으로"],
["relevant","관련 있는"],
["shift","옮기다, 이동하다"],
["pandemic","전국적인 유행병"],
["measure","조치"],
["untold","실로 엄청난"],
["manipulation","조작"],
["harmful","해로운"],
["religious","종교의"],
["political","정치적인"],
["division","분할, 분배"],
["detect","발견하다"],
["alter","변하다, 고치다"],
["swap","교환하다"],
["realistic","현실적인"],
["uncertain","불확실한"]
];

const grid = document.getElementById("grid");
const meaningBtn = document.getElementById("meaningBtn");
const wordBtn = document.getElementById("wordBtn");

let meaningHidden = false;
let wordHidden = false;
let isSpeaking = false;
let speakTimer = null;

/* 각 카드별 임시 공개 상태 */
const revealedMeaning = new Set();
const revealedWord = new Set();

function escapeHtml(text){
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function isSingleLongWord(word){
  return !word.includes(" ") && word.length >= 11;
}

function renderCards(){
  let html = "";

  vocabList.forEach((item, i) => {
    const word = item[0];
    const meaning = item[1];

    const showMeaning = !meaningHidden || revealedMeaning.has(i);
    const showWord = !wordHidden || revealedWord.has(i);

    const wordClass = isSingleLongWord(word) ? "word long-single" : "word";
    const wordHiddenClass = showWord ? "" : " hidden-text";
    const meaningHiddenClass = showMeaning ? "" : " hidden-text";

    html += `
      <div class="card" data-index="${i}">
        <div class="left">
          <div class="num">${i + 1}.</div>
          <div class="text-box">
            <div class="${wordClass}${wordHiddenClass}">${escapeHtml(word)}</div>
            <div class="meaning${meaningHiddenClass}">${escapeHtml(meaning)}</div>
          </div>
        </div>
        <button type="button" class="speak-btn" data-word="${escapeHtml(word)}">🔊</button>
      </div>
    `;
  });

  grid.innerHTML = html;

  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", function(){
      const index = Number(this.getAttribute("data-index"));

      if (meaningHidden) {
        if (revealedMeaning.has(index)) {
          revealedMeaning.delete(index);
        } else {
          revealedMeaning.add(index);
        }
      }

      if (wordHidden) {
        if (revealedWord.has(index)) {
          revealedWord.delete(index);
        } else {
          revealedWord.add(index);
        }
      }

      if (meaningHidden || wordHidden) {
        renderCards();
      }
    });
  });

  document.querySelectorAll(".speak-btn").forEach(btn => {
    btn.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();

      const word = this.getAttribute("data-word");
      speakWord(word);
    });
  });
}

function speakWord(word){
  if (!("speechSynthesis" in window)) {
    alert("이 브라우저에서는 음성 기능을 지원하지 않습니다.");
    return;
  }

  if (speakTimer) {
    clearTimeout(speakTimer);
    speakTimer = null;
  }

  try {
    window.speechSynthesis.cancel();
  } catch (e) {}

  isSpeaking = false;

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = "en-US";
  utterance.rate = 1;
  utterance.pitch = 1;
  utterance.volume = 1;

  utterance.onstart = function(){
    isSpeaking = true;
  };

  utterance.onend = function(){
    isSpeaking = false;
  };

  utterance.onerror = function(){
    isSpeaking = false;
  };

  speakTimer = setTimeout(function(){
    if (!isSpeaking) {
      window.speechSynthesis.speak(utterance);
    }
    speakTimer = null;
  }, 80);
}

meaningBtn.addEventListener("click", function(){
  meaningHidden = !meaningHidden;
  meaningBtn.textContent = meaningHidden ? "뜻 보이기" : "뜻 숨기기";

  /* 전체 보이기로 돌아갈 땐 개별 공개 상태 초기화 */
  if (!meaningHidden) {
    revealedMeaning.clear();
  }

  renderCards();
});

wordBtn.addEventListener("click", function(){
  wordHidden = !wordHidden;
  wordBtn.textContent = wordHidden ? "영어 보이기" : "영어 숨기기";

  /* 전체 보이기로 돌아갈 땐 개별 공개 상태 초기화 */
  if (!wordHidden) {
    revealedWord.clear();
  }

  renderCards();
});

renderCards();
</script>

</body>
</html>
