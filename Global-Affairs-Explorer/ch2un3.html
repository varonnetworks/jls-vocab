<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.list-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 2 Unit 3</h2>

<div class="top">
<a class="list-btn" href="./index.html">← 챕터 목록</a>
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["arrest","체포하다"],
["ridiculous","웃기는, 터무니없는"],
["notice","~을 의식하다"],
["tone","어조, 분위기"],
["nasty","끔찍한, 형편없는"],
["journalist","기자"],
["objective","객관적인"],
["reliable","믿을 만한"],
["red flag","적기"],
["come across","우연히 마주치다"],
["publish","출판하다, 발표하다"],
["trustworthy","신뢰할 수 있는"],
["bias","편견"],
["stick to","~을 고수하다"],
["label","적다"],
["specific","구체적인, 명확한"],
["contain","~이 들어 있다"],
["quote","인용"],
["vague","모호한, 애매한"],
["robbery","강도"],
["multiple","많은, 다수의"],
["fall for","~에 속다"],
["suspicious","의심스러운"],
["doubtful","확신이 없는"],
["false","사실이 아닌"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>

</html>
