<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.home-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 1 Unit 3 & Unit 4</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
<a class="home-btn" href="index.html">🏠 홈</a>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["responsible","책임 있는"],
["social","사교적인"],
["impulsive","충동적인"],
["option","선택(할 수 있는 것)"],
["end up","결국 ~하게 되다"],
["disappointed","실망한, 낙담한"],
["cautious","조심스러운, 신중한"],
["compare","비교하다"],
["thorough","빈틈없는, 철저한"],
["indecisive","결단력이 없는"],
["recently","최근에"],
["extra","추가의, 필요 이상의"],
["decision","결정, 판단"],
["regret","후회하다"],
["endlessly","끝없이"],
["price","가격"],
["brand","상표, 브랜드"],
["detail","세부 항목"],
["decide","결심하다"],
["discover","발견하다"],
["waste","낭비하다, 헛되이 쓰다"],
["guess","추측하다, 짐작하다"],
["organize","준비하다, 조직하다"],
["thoughtful","생각에 잠긴, 배려심 있는"],
["design","디자인(된 형태), 설계"],
["whole","전체의, 모든"],
["pay","(대가를) 지불하다, 돈을 내다"],
["worth","~의 가치가 있는"],
["store","가게, 상점"],
["technology","기술, 기계"],
["pair","쌍"],
["carry","들고 있다, 나르다"],
["lend","빌려주다, 대출하다"],
["thankful","고맙게 생각하는, 감사하는"],
["quantity","양, 수량"],
["sold out","다 팔린, 매진된"],
["never","결코 ~않다"],
["sensible","합리적인, 실용적인"],
["involve","수반하다, 포함하다"],
["deserve","~를 받을 만하다"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>
</html>
