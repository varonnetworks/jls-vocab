<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.home-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 2 Unit 5 & Unit 6</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
<a class="home-btn" href="index.html">🏠 홈</a>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["prove","증명하다"],
["factor","요인"],
["charitable","자선의"],
["community","지역 사회"],
["achievement","성취"],
["valuable","소중한"],
["used","중고의"],
["disadvantaged","사회적으로 혜택을 받지 못한"],
["education","교육"],
["eco-friendly","환경 친화적인"],
["profit","이익"],
["kindness","친절"],
["admirable","존경스러운"],
["impact","영향"],
["cabbage","양배추"],
["garden","정원"],
["glasses","안경"],
["solve","해결하다"],
["entrepreneur","사업가"],
["sibling","형제, 자매"],
["wonder","궁금해하다"],
["specific","구체적인"],
["task","일, 과제"],
["accomplish","완수하다"],
["concern","관련되다"],
["opinion","의견"],
["cost","값, 비용"],
["require","필요하다"],
["insecurity","불안감"],
["fee","수수료"],
["foundation","재단"],
["passion","열정"],
["rent","임대하다"],
["advertising","광고"],
["expense","비용"],
["extra","추가의"],
["buy","사다"],
["laundry","세탁"],
["seldom","좀처럼 ~않는"],
["mean","~라는 뜻이다"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>
</html>
