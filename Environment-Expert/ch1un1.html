<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Practice</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  padding:20px;
  margin:0;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
}

h2{
  margin:0 0 12px 0;
  font-size:28px;
}

/* 상단 버튼 영역 */
.top-wrap{
  position:sticky;
  top:0;
  z-index:100;
  background:#f5f6fa;
  padding:8px 0 14px;
  margin-bottom:10px;
}

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* 버튼 공통 스타일 */
button,
.list-btn,
.next-btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #d9d9d9;
  background:white;
  cursor:pointer;
  font-size:14px;
  text-decoration:none;
  color:black;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

/* 단어 카드 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}

/* 태블릿 */
@media (max-width:1024px){
  .grid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}

/* 모바일 */
@media (max-width:600px){
  .grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  body{
    padding:14px;
  }

  h2{
    font-size:24px;
  }

  .card{
    padding:12px;
  }

  .word{
    font-size:16px;
  }

  .meaning{
    font-size:13px;
  }

  .speak-btn{
    width:40px;
    height:34px;
    font-size:16px;
  }
}

.card{
  background:white;
  padding:14px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #e3e3e3;
  min-width:0;
}

.left{
  display:flex;
  gap:10px;
  min-width:0;
  flex:1;
}

.num{
  color:#666;
  font-size:14px;
  flex:0 0 auto;
}

.text-box{
  min-width:0;
}

.word{
  font-size:18px;
  font-weight:bold;
  word-break:break-word;
}

.meaning{
  margin-top:4px;
  color:#555;
  font-size:14px;
  word-break:keep-all;
}

.speak-btn{
  font-size:18px;
  border-radius:10px;
  width:46px;
  height:36px;
  flex:0 0 auto;
}

/* 다음 유닛 버튼 */
.bottom-nav{
  display:flex;
  justify-content:flex-end;
  margin-top:16px;
}

.next-btn{
  padding:14px 18px;
  font-size:16px;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="wrap">

  <h2>Chapter 1 Unit 1</h2>

  <div class="top-wrap">
    <div class="top">
      <a class="list-btn" href="./index.html">← 챕터 목록</a>
      <button id="meaningBtn" onclick="toggleMeaning()">뜻 숨기기</button>
      <button id="wordBtn" onclick="toggleWord()">영어 숨기기</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-nav">
     <a class="next-btn" href="./ch1un2.html">▶ 다음 Unit 보기
  </div>

</div>

<script>

/* 단어 목록 */
const vocabList = [
["environmentalist","환경 운동가"],
["recycle","재활용하다"],
["mold","만들다, 주조하다"],
["primary","주된, 주요한"],
["mine","광산"],
["compress","압축하다"],
["landfill","쓰레기 매립지"],
["crisis","위기"],
["ingredient","재료"],
["manufacturer","제조업체"],
["sort","분류하다"],
["informative","유익한"],
["basics","기본"],
["aluminum","알루미늄"],
["define","정의하다"],
["material","재료"],
["reel","실감개, 릴"],
["product","제품"],
["normal","보통의"],
["collection","수집"],
["approximately","거의"],
["mill","공장"],
["shred","잘게 찢다"],
["pour","붓다"],
["chemical","화학 물질"],
["contaminant","오염 물질"],
["polish","광을 내다"],
["crush","으깨다"],
["chop up","잘게 썰다"],
["pellet","작은 알갱이"],
["fraction","부분"],
["harm","해를 끼치다"],
["break down","분해되다"],
["natural","자연의"],
["thought-provoking","생각을 자극하는"],
["heat","가열하다"],
["audience","청중"],
["flat","평평한"],
["mixture","혼합물"],
["surface","표면"]
];

/* 단어 카드 생성 */
const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{
  grid.innerHTML += `
    <div class="card">
      <div class="left">
        <div class="num">${i+1}.</div>
        <div class="text-box">
          <div class="word">${v[0]}</div>
          <div class="meaning">${v[1]}</div>
        </div>
      </div>
      <button class="speak-btn" onclick="speak('${v[0].replace(/'/g, "\\'")}')">🔊</button>
    </div>
  `;
});

/* 발음 */
function speak(word){
  let u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* 뜻 숨기기 */
let meaningHidden = false;

function toggleMeaning(){
  meaningHidden = !meaningHidden;

  document.querySelectorAll(".meaning").forEach(e=>{
    e.style.display = meaningHidden ? "none" : "block";
  });

  document.getElementById("meaningBtn").textContent = meaningHidden ? "뜻 보이기" : "뜻 숨기기";
}

/* 영어 숨기기 */
let wordHidden = false;

function toggleWord(){
  wordHidden = !wordHidden;

  document.querySelectorAll(".word").forEach(e=>{
    e.style.visibility = wordHidden ? "hidden" : "visible";
  });

  document.getElementById("wordBtn").textContent = wordHidden ? "영어 보이기" : "영어 숨기기";
}

</script>

</body>
</html>
