<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Practice</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  padding:20px;
  margin:0;
  color:#111;
}

h2{
  margin:0 0 12px 0;
  font-size:28px;
}

.top-wrap{
  position:sticky;
  top:0;
  z-index:100;
  background:#f5f6fa;
  padding:8px 0 14px 0;
  margin-bottom:10px;
}

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button,
.home-btn,
.next-btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #d9d9d9;
  background:white;
  cursor:pointer;
  font-size:14px;
  text-decoration:none;
  color:black;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

@media (max-width:1024px){
  .grid{
    grid-template-columns:repeat(3,1fr);
  }
}

@media (max-width:600px){
  body{
    padding:14px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  h2{
    font-size:24px;
  }
}

.card{
  background:white;
  padding:14px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #e3e3e3;
  gap:10px;
}

.left{
  display:flex;
  gap:10px;
  min-width:0;
  flex:1;
}

.num{
  color:#666;
  font-size:14px;
  flex:0 0 auto;
}

.word{
  font-size:18px;
  font-weight:bold;
  word-break:break-word;
}

.meaning{
  margin-top:4px;
  color:#555;
  font-size:14px;
  word-break:keep-all;
}

.speak-btn{
  font-size:18px;
  border-radius:10px;
  width:46px;
  height:36px;
  flex:0 0 auto;
}

.bottom-nav{
  display:flex;
  justify-content:flex-end;
  margin-top:16px;
}
</style>
</head>

<body>

<h2>Chapter 1 Unit 3</h2>

<div class="top-wrap">
  <div class="top">
    <a class="home-btn" href="./index.html">← 챕터 목록</a>
    <button type="button" id="meaningBtn">뜻 숨기기</button>
    <button type="button" id="wordBtn">영어 숨기기</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-nav">
  <a class="next-btn" href="./ch2un1.html">▶ 다음 Unit 보기</a>
</div>

<script>
const vocabList = [
["launch","시작하다, 개시하다"],
["government","정부"],
["business","상업, 사업"],
["involve","수반하다"],
["individual","개인"],
["flood","홍수"],
["separate","분리하다"],
["organization","조직, 기구"],
["industry","산업"],
["non-profit","비영리적인"],
["attack","폭행"],
["restore","복원하다"],
["definitely","확실히"],
["location","위치"],
["aware","알고 있는"],
["rely","의지하다"],
["directly","곧장, 똑바로"],
["global","세계적인"],
["firmly","단호히, 확고히"],
["paperless","종이를 쓰지 않는"],
["appreciate","진가를 알아보다"],
["conservation","보호, 보존"],
["succeed","성공하다"],
["wire","철사, 전선"],
["benefit","유익하다"],
["volunteer","자원하다"],
["electrical","전기의"],
["regularly","규칙적으로"],
["precious","귀중한"],
["carton","한 갑, 상자"]
];

const grid = document.getElementById("grid");
const meaningBtn = document.getElementById("meaningBtn");
const wordBtn = document.getElementById("wordBtn");

let meaningHidden = false;
let wordHidden = false;

function escapeHtml(text){
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function renderCards(){
  let html = "";

  vocabList.forEach((v, i) => {
    html += `
      <div class="card">
        <div class="left">
          <div class="num">${i+1}.</div>
          <div>
            <div class="word" ${wordHidden ? 'style="visibility:hidden;"' : ""}>${escapeHtml(v[0])}</div>
            <div class="meaning" ${meaningHidden ? 'style="display:none;"' : ""}>${escapeHtml(v[1])}</div>
          </div>
        </div>
        <button class="speak-btn" type="button" onclick="speak(${JSON.stringify(v[0])})">🔊</button>
      </div>
    `;
  });

  grid.innerHTML = html;
}

function speak(word){
  if (!window.speechSynthesis) return;

  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function toggleMeaning(){
  meaningHidden = !meaningHidden;
  meaningBtn.textContent = meaningHidden ? "뜻 보이기" : "뜻 숨기기";
  renderCards();
}

function toggleWord(){
  wordHidden = !wordHidden;
  wordBtn.textContent = wordHidden ? "영어 보이기" : "영어 숨기기";
  renderCards();
}

meaningBtn.addEventListener("click", toggleMeaning);
wordBtn.addEventListener("click", toggleWord);

renderCards();
</script>

</body>
</html>
