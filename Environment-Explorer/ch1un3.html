<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.list-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 1 Unit 3</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
<a class="list-btn" href="./index.html">← 챕터 목록</a>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["launch","시작하다, 개시하다"],
["government","정부"],
["business","상업, 사업"],
["involve","수반하다"],
["individual","개인"],
["flood","홍수"],
["separate","분리하다"],
["organization","조직, 기구"],
["industry","산업"],
["non-profit","비영리적인"],
["attack","폭행"],
["restore","복원하다"],
["definitely","확실히"],
["location","위치"],
["aware","알고 있는"],
["rely","의지하다"],
["directly","곧장, 똑바로"],
["global","세계적인"],
["firmly","단호히, 확고히"],
["paperless","종이를 쓰지 않는"],
["appreciate","진가를 알아보다"],
["conservation","보호, 보존"],
["succeed","성공하다"],
["wire","철사, 전선"],
["benefit","유익하다"],
["volunteer","자원하다"],
["electrical","전기의"],
["regularly","규칙적으로"],
["precious","귀중한"],
["carton","한 갑, 상자"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>

</html>
