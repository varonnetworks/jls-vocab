<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Practice</title>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  color:#111;
  padding:20px;
}

.page{
  width:100%;
}

h2{
  margin:0 0 12px 0;
  font-size:28px;
  line-height:1.2;
}

.top-wrap{
  position:sticky;
  top:0;
  z-index:100;
  background:#f5f6fa;
  padding:8px 0 14px 0;
  margin-bottom:10px;
}

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:8px 12px;
  font-size:14px;
  line-height:1.2;
  text-decoration:none;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn:hover{
  background:#fafafa;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:14px;
  align-items:start;
}

.card{
  background:#fff;
  border:1px solid #e3e3e3;
  border-radius:16px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-width:0;
}

.left{
  display:flex;
  gap:10px;
  min-width:0;
  flex:1;
}

.num{
  color:#666;
  font-size:14px;
  flex:0 0 auto;
  line-height:1.4;
}

.text-box{
  min-width:0;
}

.word{
  font-size:18px;
  font-weight:700;
  line-height:1.25;
  word-break:break-word;
}

.meaning{
  margin-top:4px;
  color:#555;
  font-size:14px;
  line-height:1.35;
  word-break:keep-all;
}

.speak-btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  border-radius:10px;
  width:46px;
  height:36px;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  flex:0 0 auto;
}

.speak-btn:hover{
  background:#fafafa;
}

.bottom-nav{
  display:flex;
  justify-content:flex-end;
  margin-top:16px;
}

.next-btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  color:#111;
  border-radius:14px;
  padding:14px 18px;
  font-size:16px;
  line-height:1.2;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.next-btn:hover{
  background:#fafafa;
}

@media (max-width:1024px){
  .grid{
    grid-template-columns:repeat(3, minmax(0, 1fr));
  }
}

@media (max-width:600px){
  body{
    padding:14px;
  }

  h2{
    font-size:24px;
  }

  .grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
  }

  .card{
    padding:12px;
  }

  .word{
    font-size:16px;
  }

  .meaning{
    font-size:13px;
  }

  .speak-btn{
    width:40px;
    height:34px;
    font-size:16px;
  }

  .next-btn{
    font-size:15px;
    padding:12px 16px;
  }
}
</style>
</head>
<body>

<div class="page">
  <h2>Chapter 1 Unit 3</h2>

  <div class="top-wrap">
    <div class="top">
      <a class="btn" href="./index.html">← 챕터 목록</a>
      <button type="button" class="btn" id="meaningBtn">뜻 숨기기</button>
      <button type="button" class="btn" id="wordBtn">영어 숨기기</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-nav">
    <a class="next-btn" href="./ch2un1.html">▶ 다음 Unit 보기</a>
  </div>
</div>

<script>
const vocabList = [
["launch","시작하다, 개시하다"],
["government","정부"],
["business","상업, 사업"],
["involve","수반하다"],
["individual","개인"],
["flood","홍수"],
["separate","분리하다"],
["organization","조직, 기구"],
["industry","산업"],
["non-profit","비영리적인"],
["attack","폭행"],
["restore","복원하다"],
["definitely","확실히"],
["location","위치"],
["aware","알고 있는"],
["rely","의지하다"],
["directly","곧장, 똑바로"],
["global","세계적인"],
["firmly","단호히, 확고히"],
["paperless","종이를 쓰지 않는"],
["appreciate","진가를 알아보다"],
["conservation","보호, 보존"],
["succeed","성공하다"],
["wire","철사, 전선"],
["benefit","유익하다"],
["volunteer","자원하다"],
["electrical","전기의"],
["regularly","규칙적으로"],
["precious","귀중한"],
["carton","한 갑, 상자"]
];

const grid = document.getElementById("grid");
const meaningBtn = document.getElementById("meaningBtn");
const wordBtn = document.getElementById("wordBtn");

let meaningHidden = false;
let wordHidden = false;
let voices = [];

function loadVoices(){
  voices = window.speechSynthesis.getVoices();
}

loadVoices();
window.speechSynthesis.onvoiceschanged = loadVoices;

function escapeHtml(text){
  return text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function renderCards(){
  let html = "";

  vocabList.forEach((item, i) => {
    const word = item[0];
    const meaning = item[1];

    html += `
      <div class="card">
        <div class="left">
          <div class="num">${i + 1}.</div>
          <div class="text-box">
            <div class="word"${wordHidden ? ' style="visibility:hidden;"' : ""}>${escapeHtml(word)}</div>
            <div class="meaning"${meaningHidden ? ' style="display:none;"' : ""}>${escapeHtml(meaning)}</div>
          </div>
        </div>
        <button type="button" class="speak-btn" data-word="${escapeHtml(word)}">🔊</button>
      </div>
    `;
  });

  grid.innerHTML = html;

  document.querySelectorAll(".speak-btn").forEach(btn => {
    btn.addEventListener("click", function(){
      speakWord(this.dataset.word);
    });
  });
}

function speakWord(word){
  if (!("speechSynthesis" in window)) {
    alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
    return;
  }

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = "en-US";
  utter.rate = 0.9;
  utter.pitch = 1;
  utter.volume = 1;

  const englishVoice =
    voices.find(v => v.lang && v.lang.toLowerCase().includes("en-us")) ||
    voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) ||
    null;

  if (englishVoice) {
    utter.voice = englishVoice;
  }

  utter.onerror = function(e){
    console.log("speech error:", e);
    alert("발음 재생이 안 됩니다. 브라우저 음성 설정을 확인해주세요.");
  };

  window.speechSynthesis.speak(utter);
}

meaningBtn.addEventListener("click", function(){
  meaningHidden = !meaningHidden;
  meaningBtn.textContent = meaningHidden ? "뜻 보이기" : "뜻 숨기기";
  renderCards();
});

wordBtn.addEventListener("click", function(){
  wordHidden = !wordHidden;
  wordBtn.textContent = wordHidden ? "영어 보이기" : "영어 숨기기";
  renderCards();
});

renderCards();
</script>

</body>
</html>
