<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Practice</title>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  color:#111;
  padding:20px;
}

.page{
  width:100%;
}

h2{
  margin:0 0 12px 0;
  font-size:28px;
  line-height:1.2;
}

/* 상단 고정 */
.top-wrap{
  position:sticky;
  top:0;
  z-index:100;
  background:#f5f6fa;
  padding:8px 0 14px 0;
  margin-bottom:10px;
}

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* 버튼 공통 */
.btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:8px 12px;
  font-size:14px;
  line-height:1.2;
  text-decoration:none;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn:hover{
  background:#fafafa;
}

/* 카드 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:14px;
  align-items:start;
}

.card{
  background:#fff;
  border:1px solid #e3e3e3;
  border-radius:16px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-width:0;
}

.left{
  display:flex;
  gap:10px;
  min-width:0;
  flex:1;
}

.num{
  color:#666;
  font-size:14px;
  flex:0 0 auto;
  line-height:1.4;
}

.text-box{
  min-width:0;
}

.word{
  font-size:18px;
  font-weight:700;
  line-height:1.25;
  word-break:break-word;
}

.meaning{
  margin-top:4px;
  color:#555;
  font-size:14px;
  line-height:1.35;
  word-break:keep-all;
}

.speak-btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  border-radius:10px;
  width:46px;
  height:36px;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  flex:0 0 auto;
}

.speak-btn:hover{
  background:#fafafa;
}

/* 하단 다음 버튼 */
.bottom-nav{
  display:flex;
  justify-content:flex-end;
  margin-top:16px;
}

.next-btn{
  appearance:none;
  -webkit-appearance:none;
  border:1px solid #d9d9d9;
  background:#fff;
  color:#111;
  border-radius:14px;
  padding:14px 18px;
  font-size:16px;
  line-height:1.2;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.next-btn:hover{
  background:#fafafa;
}

/* 태블릿 */
@media (max-width:1024px){
  .grid{
    grid-template-columns:repeat(3, minmax(0, 1fr));
  }
}

/* 모바일 */
@media (max-width:600px){
  body{
    padding:14px;
  }

  h2{
    font-size:24px;
  }

  .grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
  }

  .card{
    padding:12px;
  }

  .word{
    font-size:16px;
  }

  .meaning{
    font-size:13px;
  }

  .speak-btn{
    width:40px;
    height:34px;
    font-size:16px;
  }

  .next-btn{
    font-size:15px;
    padding:12px 16px;
  }
}
</style>
</head>
<body>

<div class="page">
  <h2>Chapter 1 Unit 2</h2>

  <div class="top-wrap">
    <div class="top">
      <a class="btn" href="./index.html">← 챕터 목록</a>
      <button type="button" class="btn" id="meaningBtn">뜻 숨기기</button>
      <button type="button" class="btn" id="wordBtn">영어 숨기기</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-nav">
    <a class="next-btn" href="./ch1un3.html">▶ 다음 Unit 보기</a>
  </div>
</div>

<script>
const vocabList = [
["victim","피해자"],
["survival","생존"],
["crop","작물"],
["civilization","문명"],
["shortage","부족"],
["absence","결석"],
["destruction","파괴"],
["decrease","줄다"],
["carbon footprint","탄소발자국"],
["impact","영향"],
["deforestation","삼림 벌채"],
["forage","먹이를 찾다"],
["devastating","대단히 파괴적인"],
["logger","벌목꾼"],
["currently","현재, 지금"],
["vulnerable","취약한"],
["development","신개발품"],
["increase","증가하다"],
["agriculture","농업"],
["risk","위험 요소"],
["erosion","부식, 침식"],
["variety","다양성"],
["landslide","산사태"],
["grazing","목초지"],
["harvest","수확하다"],
["alarming","걱정스러운"],
["ranch","목장"],
["rainforest","열대우림"],
["soybean","콩"],
["palm tree","야자나무"]
];

const grid = document.getElementById("grid");
const meaningBtn = document.getElementById("meaningBtn");
const wordBtn = document.getElementById("wordBtn");

let meaningHidden = false;
let wordHidden = false;

function escapeHtml(text){
  return text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function renderCards(){
  let html = "";

  vocabList.forEach((item, i) => {
    const word = item[0];
    const meaning = item[1];

    html += `
      <div class="card">
        <div class="left">
          <div class="num">${i + 1}.</div>
          <div class="text-box">
            <div class="word"${wordHidden ? ' style="visibility:hidden;"' : ""}>${escapeHtml(word)}</div>
            <div class="meaning"${meaningHidden ? ' style="display:none;"' : ""}>${escapeHtml(meaning)}</div>
          </div>
        </div>
        <button type="button" class="speak-btn" onclick="speakWord(${JSON.stringify(word)})">🔊</button>
      </div>
    `;
  });

  grid.innerHTML = html;
}

function speakWord(word){
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

meaningBtn.addEventListener("click", function(){
  meaningHidden = !meaningHidden;
  meaningBtn.textContent = meaningHidden ? "뜻 보이기" : "뜻 숨기기";
  renderCards();
});

wordBtn.addEventListener("click", function(){
  wordHidden = !wordHidden;
  wordBtn.textContent = wordHidden ? "영어 보이기" : "영어 숨기기";
  renderCards();
});

renderCards();
</script>

</body>
</html>
