<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.home-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 1 Unit 3 & Unit 4</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
<a class="home-btn" href="index.html">🏠 홈</a>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["resource","자원, 재원"],
["realize","깨닫다, 알아차리다"],
["sewage","하구, 오물"],
["treatment","처리"],
["unsafe","위험한, 안전하지 못한"],
["tangled","뒤얽힌"],
["pile up","많아지다, 쌓이다"],
["solution","해결책, 해법"],
["restrict","제한하다"],
["waste","쓰레기, 폐기물"],
["contaminate","오염시키다"],
["impact","영향을 주다"],
["natural","자연의"],
["drain","배수관"],
["poor","좋지 못한, 조잡한"],
["plant","시설"],
["overuse","남용"],
["factory","공장"],
["above","(위치가) 위에"],
["ugly","추한, 보기 싫은"],
["junk","쓸모 없는 물건, 쓰레기"],
["destroy","파괴하다, 말살하다"],
["somewhere","어딘가에"],
["area","지역"],
["even","훨씬 더"],
["get sick","병에 걸리다"],
["cancer","암"],
["hurt","다치게 하다"],
["lung","폐, 허파"],
["grow","자라다, 재배하다"],
["due to","~때문에"],
["add up to","결국 ~되다"],
["sure","확신하는"],
["leave","남기다"],
["litter","쓰레기"],
["drink","마시다"],
["not only A but also B","A뿐만 아니라 B"],
["easily","쉽게"],
["happen","발생하다"],
["contain","~이 들어 있다"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>
</html>
