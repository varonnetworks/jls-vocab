<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.home-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 2 Unit 3 & Unit 4</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
<a class="home-btn" href="index.html">🏠 홈</a>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["obtain","얻다, 손에 넣다"],
["panel","사각형 판"],
["run","운영하다"],
["store","저장하다, 보관하다"],
["install","설치하다, 설비하다"],
["collect","모으다, 수집하다"],
["source","(사물의) 원천, 근원"],
["system","제도, 체제"],
["power","동력을 공급하다, 작동시키다"],
["effective","효과적인"],
["practical","현실적인, 타당한"],
["innovate","혁신하다"],
["energy","에너지, 동력자원"],
["burn","태우다"],
["capture","수집"],
["tank","(액체를 담는) 탱크"],
["biofuel","생물 연료, 바이오 연료"],
["stay","계속 (그대로) 있다"],
["protect","보호하다, 지키다"],
["benefit","혜택, 이득"],
["stove","난로"],
["severe","극심한, 심각한"],
["outdoor","야외의"],
["roof","지붕"],
["appliance","(가정용) 기기"],
["sprinkle","뿌리다"],
["straw","짚, 지푸라기"],
["describe","묘사하다, 서술하다"],
["useful","유용한, 유능한"],
["simple","간단한, 단순한"],
["fix","고정시키다, 수리하다"],
["issue","(논의나 논쟁의) 주제, 쟁점"],
["try","노력하다, 시도하다"],
["main","주된, 중요한"],
["indicate","나타내다, 보여주다"],
["control","지배하다, 제어하다"],
["therefore","그러므로, 그러니"],
["machine","기계"],
["get rid of","제거하다, 끝내다"],
["type","형태, 유형, 종류"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>
</html>
