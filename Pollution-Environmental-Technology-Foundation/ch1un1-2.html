<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.list-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 1 Unit 1 & Unit 2</h2>

<div class="top">
<a class="list-btn" href="./index.html">← 챕터 목록</a>
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["harm","해를 끼치다, 손상시키다"],
["pollute","오염시키다"],
["result","(~의 결과로) 발생하다"],
["serious","심각한, 중대한"],
["emission","(대기 속의) 배출물"],
["increase","증가하다, 늘다"],
["fuel","연료"],
["atmosphere","(지구의) 대기"],
["breathe","호흡하다, 숨을 쉬다"],
["decrease","감소하다, 줄다"],
["negative","나쁜, 부정적인"],
["chemical","화학 물질"],
["cause","원인"],
["gasoline","휘발유, 가솔린"],
["contamination","오염, 더러움"],
["power station","발전소"],
["air quality","공기의 질"],
["pesticide","농약, 살충제"],
["soil","토양, 흙"],
["purify","정화하다"],
["affect","영향을 미치다"],
["ecology","생태(계), 생태학"],
["lake","호수"],
["while","~하는 동안"],
["whereas","반면에"],
["nuclear","원자력의, 핵의"],
["long-lasting","오래 지속되는, 지속 가능한"],
["climate","기후"],
["since","~한 때로부터, ~때문에"],
["nearby","인근의, 가까운 곳의"],
["electric","전기의, 전기를 이용하는"],
["keep","유지하다"],
["spill","흐르다, 유출하다"],
["annoy","짜증나게 하다"],
["noise","소리, 잡음"],
["effect","영향, 결과, 효과"],
["waste","낭비하다"],
["around","주위에"],
["cause","~을 야기하다, 초래하다"],
["ocean","대양, 바다"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>

</html>
