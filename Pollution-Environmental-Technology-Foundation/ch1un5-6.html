<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

/* 상단 버튼 영역 */

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* 버튼 공통 스타일 */

button,
.list-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:black;
display:inline-flex;
align-items:center;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 모바일에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 1 Unit 5 & Unit 6</h2>

<div class="top">
<a class="list-btn" href="./index.html">← 챕터 목록</a>
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/* 단어 목록 */

const vocabList = [
["flood","물에 잠기다, 침수되다"],
["litter","(쓰레기 등을) 버리다"],
["trash","쓰레기"],
["properly","적당히, 올바르게"],
["build up","점점 커지다, 점점 나빠지다"],
["reduce","줄이다, 축소하다"],
["dump","내버리다, 처분하다"],
["bury","묻다, 매장하다"],
["leak","(액체, 기체가) 새다, 새어 나오다"],
["recycle","재활용하다"],
["project","계획, 기획"],
["threat","위협, 위험"],
["soak up","흡수하다, 빨아들이다"],
["common","일반적인"],
["throw away","~을 버리다"],
["damage","피해를 입히다, 훼손하다"],
["as a result","결과적으로"],
["construction","건설, 공사"],
["public transportation","대중교통"],
["death","죽음"],
["horrible","끔찍한, 불쾌한"],
["landfill","쓰레기 매립지"],
["spend","(시간을) 보내다"],
["neighborhood","인근, 근처"],
["wildlife","야생동물"],
["cut down","(나무나 덤불을) 베다"],
["lead to","~로 이어지다"],
["huge","막대한, 거대한"],
["warn","경고하다, 강력히 충고하다"],
["way","방법, 방식"],
["satellite","(인공)위성"],
["symptom","증상"],
["engine","엔진, 기관차"],
["withdraw","물러나다, 취소하다"],
["near","가까운, 가까이"],
["prevent","(~가 ~하는 것을) 막다, 방지하다"],
["illegal","불법적인"],
["provide","제공하다, 주다"],
["sickness","질병, 아픔"],
["underground","지하의"]
];


/* 단어 카드 생성 */

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`;

});


/* 발음 */

function speak(word){

let u = new SpeechSynthesisUtterance(word);
u.lang = 'en-US';
speechSynthesis.speak(u);

}


/* 뜻 숨기기 */

let meaningHidden = false;

function toggleMeaning(){

meaningHidden = !meaningHidden;

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display = meaningHidden ? "none" : "block";
});

}


/* 영어 숨기기 */

let wordHidden = false;

function toggleWord(){

wordHidden = !wordHidden;

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility = wordHidden ? "hidden" : "visible";
});

}

</script>

</body>

</html>
