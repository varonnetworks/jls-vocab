<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<!-- 여기만 수정 -->
<h2>Chapter 1 Unit 3 & Unit 4</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/*
=========================
여기 단어만 수정
=========================
*/

const vocabList = [
["subject","소재, 대상"],
["issue","문제, 시안"],
["ordinary","보통의, 일상적인"],
["recognize","인정하다, 인식하다"],
["landscape","풍경"],
["cave","동굴"],
["lifelike","실물과 똑같은"],
["bold","선명한, 굵은"],
["realistic","현실적인"],
["peaceful","평화로운"],
["powerful","강렬한, 강력한"],
["public","대중의, 일반인의"],
["abstract","추상적인"],
["piece","(미술, 음악) 작품"],
["capture","담아내다, 포착하다"],
["message","메시지"],
["unreal","비현실적인"],
["social","사회의"],
["mural","벽화"],
["topic","주제"],
["normal","보통의, 정상적인"],
["thrilling","황홀한, 흥분되는"],
["unusual","특이한, 색다른"],
["exciting","신나는, 흥미진진한"],
["scenery","경치, 배경"],
["funky","비트가 강한"],
["nervous","불안해하는"],
["mysterious","신비한"],
["jealous","질투하는, 시기하는"],
["striking","두드러진"],
["traditional","전통적인"],
["unique","특별한"],
["theater","극장"],
["catchy","기억하기 쉬운"],
["appearance","모습"],
["confused","혼란스러운"],
["bright","밝은"],
["curious","궁금한"],
["silly","어리석은, 우스꽝스러운"],
["calm","침착한"]
];



/* 아래는 건드리지 마세요 */

const grid=document.getElementById("grid")

vocabList.forEach((v,i)=>{

grid.innerHTML+=`

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`

})

function speak(word){

let u=new SpeechSynthesisUtterance(word)
u.lang='en-US'
speechSynthesis.speak(u)

}

let meaningHidden=false

function toggleMeaning(){

meaningHidden=!meaningHidden

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display=meaningHidden?"none":"block"
})

}

let wordHidden=false

function toggleWord(){

wordHidden=!wordHidden

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility=wordHidden?"hidden":"visible"
})

}

</script>

</body>
</html>
