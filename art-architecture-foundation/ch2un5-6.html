<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<!-- 여기만 수정 -->
<h2>Chapter 2 Unit 5 & Unit 6</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/*
=========================
여기 단어만 수정
=========================
*/

const vocabList = [
["astounding","놀라운, 놀랄 만한"],
["symmetrical","대칭적인"],
["purpose","목적"],
["landmark","주요 지형 지물"],
["design","디자인"],
["concert","연주회, 콘서트"],
["function","기능을 하다"],
["opera","오페라"],
["tourist","관광객"],
["attraction","명소"],
["gorgeous","아주 멋진"],
["carved","조각된"],
["modern","현대의"],
["natural","자연의"],
["traditional","전통의, 전통적인"],
["form","종류, 형태"],
["dome","반구형 지붕"],
["stack","쌓다"],
["curved","곡선 모양의"],
["geometric","기하학적인"],
["express","표현하다"],
["museum","박물관"],
["operate","작동되다, 운용되다"],
["observation deck","전망대"],
["host","진행하다, 주최하다"],
["similarity","유사점"],
["architecture","건축학"],
["brick","벽돌"],
["contrast","차이, 대조"],
["feature","특색"],
["differ","다르다"],
["tool","연장"],
["bury","묻다"],
["organization","구조"],
["impressive","인상적인"],
["private","사적인"],
["underwater","물속의, 수중의"],
["planet","행성"],
["religious","종교의"],
["height","높이"]
];



/* 아래는 건드리지 마세요 */

const grid=document.getElementById("grid")

vocabList.forEach((v,i)=>{

grid.innerHTML+=`

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`

})

function speak(word){

let u=new SpeechSynthesisUtterance(word)
u.lang='en-US'
speechSynthesis.speak(u)

}

let meaningHidden=false

function toggleMeaning(){

meaningHidden=!meaningHidden

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display=meaningHidden?"none":"block"
})

}

let wordHidden=false

function toggleWord(){

wordHidden=!wordHidden

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility=wordHidden?"hidden":"visible"
})

}

</script>

</body>
</html>
