<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<!-- 여기만 수정 -->
<h2>Chapter 1 Unit 5 & Unit 6</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/*
=========================
여기 단어만 수정
=========================
*/

const vocabList = [
["combine","결합하다"],
["character","등장 인물"],
["visual","시각의, (눈으로) 보는"],
["wonder","궁금해하다"],
["premiere","첫 공연하다"],
["invent","발명하다"],
["dialogue","대화"],
["silent","말을 안 하는"],
["audio","음성의"],
["sound effect","음향 효과"],
["improve","개선하다, 나아지다"],
["theater","극장"],
["imaginative","창의적인, 상상력이 풍부한"],
["universe","우주, 은하계"],
["scene","장면"],
["computer-generated imagery (CGI)","컴퓨터 생성 이미지"],
["incredible","대단한, 훌륭한"],
["generation","세대"],
["plot","구성, 줄거리"],
["unreal","비현실적인"],
["science fiction","공상 과학 소설"],
["sunrise","일출"],
["conversation","대화"],
["message","메시지"],
["chase","뒤쫓다"],
["meaning","뜻, 의미"],
["villain","악당"],
["motivated","동기가 된"],
["hero","영웅"],
["scared","무서워하는, 겁먹은"],
["memorable","기억할 만한"],
["surrealistic","초현실주의의"],
["share","나누다"],
["bright","밝은"],
["abstract","추상적인"],
["unusual","특이한, 색다른"],
["calm","침착한"],
["inspiring","영감을 주는"],
["impressive","인상적인"],
["curious","궁금한"]
];


/* 아래는 건드리지 마세요 */

const grid=document.getElementById("grid")

vocabList.forEach((v,i)=>{

grid.innerHTML+=`

<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>

`

})

function speak(word){

let u=new SpeechSynthesisUtterance(word)
u.lang='en-US'
speechSynthesis.speak(u)

}

let meaningHidden=false

function toggleMeaning(){

meaningHidden=!meaningHidden

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display=meaningHidden?"none":"block"
})

}

let wordHidden=false

function toggleWord(){

wordHidden=!wordHidden

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility=wordHidden?"hidden":"visible"
})

}

</script>

</body>
</html>
