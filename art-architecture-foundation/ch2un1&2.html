<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

.top{
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
}

/* 단어 카드 그리드 */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

/* 휴대폰에서는 2열 */

@media (max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:white;
padding:14px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 2 Unit 1 & Unit 2</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

/*
============================
여기 단어만 수정하면 됩니다
============================
*/

const vocabList = [
["impressive","인상적인"],
["monument","기념비적인 건축물"],
["compare","비교하다"],
["display","드러내다, 보이다"],
["complete","완료하다, 끝마치다"],
["building","건물"],
["tomb","무덤"],
["material","재료, 자재"],
["decorate","장식하다"],
["surface","표면"],
["arch","아치형 구조물"],
["underground","지하의"],
["column","(둥근) 기둥"],
["historical","역사의, 역사적인"],
["contrast","차이, 대조"],
["culture","문화"],
["story","(건물의) 층"],
["capable","~을 할 수 있는"],
["architecture","건축, 건축학"],
["admiration","감탄, 존경"],
["quality","질"],
["outer","외부의, 바깥쪽의"],
["amazing","놀라운"],
["cathedral","대성당"],
["difference","차이"],
["traditional","전통적인"],
["be famous for","~로 유명하다"],
["tourist destination","관광지"],
["theater","극장"],
["religious","종교의"],
["grand","웅장한"],
["unique","특별한"],
["interesting","재미있는, 흥미로운"],
["sightseeing","관광"],
["skyscraper","고층 건물"],
["be made of","~으로 만들어지다"],
["steel","강철"],
["awesome","기막히게 좋은"],
["concrete","콘크리트"],
["be located","위치해 있다"]
];


/* 아래 코드는 건드릴 필요 없음 */

const grid=document.getElementById("grid")

vocabList.forEach((v,i)=>{

grid.innerHTML+=`
<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>
`

})


function speak(word){

let u=new SpeechSynthesisUtterance(word)
u.lang='en-US'
speechSynthesis.speak(u)

}


let meaningHidden=false

function toggleMeaning(){

meaningHidden=!meaningHidden

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display=meaningHidden?"none":"block"
})

}


let wordHidden=false

function toggleWord(){

wordHidden=!wordHidden

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility=wordHidden?"hidden":"visible"
})

}

</script>

</body>
</html>
