<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JLS Race Preview</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:Arial,sans-serif;
    background:#f3f3f1;
    color:#1f2430;
  }

  /* 로그인 */
  .login-page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(93,202,165,0.08), transparent 20%),
      radial-gradient(circle at 80% 30%, rgba(233,160,162,0.12), transparent 25%),
      #f3f3f1;
  }
  .login-card{
    width:100%;
    max-width:420px;
    background:#fff;
    border:1px solid #e5e6ea;
    border-radius:28px;
    padding:28px 24px 24px;
    box-shadow:0 16px 36px rgba(0,0,0,0.06);
    position:relative;
    overflow:hidden;
  }
  .login-card::before{
    content:"";
    position:absolute;
    right:-40px;
    top:-40px;
    width:140px;
    height:140px;
    border-radius:50%;
    background:rgba(93,202,165,0.12);
  }
  .login-card::after{
    content:"";
    position:absolute;
    left:-30px;
    bottom:-30px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(116,124,148,0.08);
  }
  .login-top{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:26px;
  }
  .logo{
    font-size:34px;
    font-weight:800;
    letter-spacing:-0.04em;
  }
  .level-badge{
    background:#eaf1ff;
    color:#5675b9;
    font-size:13px;
    font-weight:700;
    padding:6px 10px;
    border-radius:999px;
  }
  .login-title{
    position:relative;
    z-index:1;
    font-size:24px;
    font-weight:800;
    margin-bottom:8px;
  }
  .login-sub{
    position:relative;
    z-index:1;
    font-size:14px;
    color:#7b8089;
    margin-bottom:20px;
  }
  .input{
    position:relative;
    z-index:1;
    width:100%;
    height:50px;
    border:1px solid #d8dbe1;
    border-radius:16px;
    padding:0 16px;
    margin-bottom:12px;
    font-size:15px;
    outline:none;
    background:#fff;
  }
  .input:focus{
    border-color:#7f8fb5;
    box-shadow:0 0 0 4px rgba(127,143,181,0.08);
  }
  .login-btn{
    position:relative;
    z-index:1;
    width:100%;
    height:52px;
    border:none;
    border-radius:16px;
    background:#61697f;
    color:#fff;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
  }
  .hint{
    position:relative;
    z-index:1;
    margin-top:12px;
    font-size:13px;
    color:#8b9098;
    text-align:center;
  }

  /* 레이스 */
  .race-page{
    display:none;
    min-height:100vh;
    padding:14px;
  }
  .race-page.show{display:block;}

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:12px;
    flex-wrap:wrap;
  }
  .top-left{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .top-title{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .top-title .logo{
    font-size:22px;
  }
  .top-right{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .user-pill,
  .logout-btn,
  .tab-btn{
    border-radius:999px;
    border:1px solid #e1e3e8;
    background:#fff;
    padding:10px 14px;
    font-size:13px;
    font-weight:700;
  }
  .logout-btn{
    background:#61697f;
    color:#fff;
    border:none;
    cursor:pointer;
  }
  .tab-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .tab-group{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tab-btn{
    cursor:pointer;
    color:#646a74;
  }
  .tab-btn.active{
    background:#61697f;
    color:#fff;
    border-color:#61697f;
  }

  .board{
    margin-top:12px;
    background:#61697f;
    border-radius:24px;
    padding:12px;
  }
  .board-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
    flex-wrap:wrap;
  }
  .board-title{
    color:#fff;
    font-size:22px;
    font-weight:800;
    margin-bottom:4px;
  }
  .board-sub{
    color:rgba(255,255,255,0.75);
    font-size:13px;
    font-weight:600;
  }
  .board-summary{
    background:rgba(255,255,255,0.1);
    color:#fff;
    border-radius:14px;
    padding:10px 14px;
    font-size:14px;
    font-weight:700;
  }

  .main{
    display:grid;
    grid-template-columns:300px minmax(0,1fr);
    gap:12px;
  }

  .rank-panel,
  .track-panel{
    background:#f6f5f3;
    border-radius:22px;
    padding:12px;
  }

  .rank-header{
    font-size:14px;
    font-weight:800;
    color:#4d5463;
    margin-bottom:10px;
  }

  .rank-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .rank-item{
    display:flex;
    align-items:center;
    gap:10px;
    background:#fff;
    border-radius:18px;
    padding:10px 12px;
    min-height:74px;
    border:1px solid rgba(0,0,0,0.04);
  }

  .rank-item.me{
    background:#61697f;
    color:#fff;
  }

  .rank-no{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#efc548;
    color:#6d5717;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:13px;
    flex-shrink:0;
  }
  .rank-item:not(:first-child) .rank-no{
    background:#eceff4;
    color:#6f7580;
  }
  .rank-item.me .rank-no{
    background:#38d7a3;
    color:#fff;
  }

  .avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:21px;
    font-weight:800;
    color:#fff;
    flex-shrink:0;
    overflow:hidden;
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .avatar.c1{background:#79cdb2;}
  .avatar.c2{background:#7fa2ea;}
  .avatar.c3{background:#d6b28f;}
  .avatar.c4{background:#e6a3a5;}
  .avatar.c5{background:#a7c8d0;}

  .rank-info{
    flex:1;
    min-width:0;
  }
  .rank-name{
    font-size:16px;
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-bottom:2px;
  }
  .rank-sub{
    font-size:11px;
    color:#9aa0aa;
    line-height:1.2;
  }
  .rank-item.me .rank-sub{
    color:rgba(255,255,255,0.72);
  }

  .rank-score{
    text-align:right;
    flex-shrink:0;
  }
  .rank-score strong{
    display:block;
    color:#37cfa0;
    font-size:17px;
    font-weight:800;
    line-height:1;
  }
  .rank-score span{
    color:#aeb3bb;
    font-size:11px;
  }
  .rank-item.me .rank-score strong{
    color:#5be2af;
  }
  .rank-item.me .rank-score span{
    color:rgba(255,255,255,0.72);
  }

  .dots{
    text-align:center;
    color:#b9bdc5;
    letter-spacing:5px;
    padding:2px 0;
    font-size:14px;
  }

  .track-stage{
    background:#fbfbfa;
    border-radius:18px;
    min-height:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:12px;
  }
  canvas{
    width:100%;
    max-width:720px;
    height:auto;
    display:block;
  }

  .cards{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .info-card{
    min-width:170px;
    border-radius:18px;
    padding:16px 18px;
    text-align:center;
    font-weight:800;
  }
  .info-card.dark{
    background:#61697f;
    color:#fff;
  }
  .info-card.light{
    background:#ead9a6;
    color:#5e543c;
  }
  .info-card .big{
    font-size:16px;
    margin-bottom:4px;
  }
  .info-card .small{
    font-size:15px;
    font-weight:800;
  }

  @media (max-width: 980px){
    .main{
      grid-template-columns:1fr;
    }
    .track-stage{
      min-height:260px;
    }
  }

  @media (max-width: 640px){
    .race-page{
      padding:10px;
    }
    .board{
      padding:10px;
      border-radius:20px;
    }
    .board-title{
      font-size:20px;
    }
    .track-stage{
      min-height:220px;
      padding:8px;
    }
    .rank-name{
      font-size:15px;
    }
  }
</style>
</head>
<body>

<!-- 로그인 -->
<section class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-top">
      <div class="logo">JLS Race</div>
      <div class="level-badge">DSD1</div>
    </div>
    <div class="login-title">학생 로그인</div>
    <div class="login-sub">아이디와 비밀번호를 입력해주세요.</div>
    <input class="input" placeholder="아이디 (예: rina7317)" />
    <input class="input" type="password" placeholder="비밀번호" />
    <button class="login-btn" onclick="showRace()">로그인</button>
    <div class="hint">디자인 확인용 화면입니다.</div>
  </div>
</section>

<!-- 레이스 -->
<section class="race-page" id="racePage">
  <div class="topbar">
    <div class="top-left">
      <div class="top-title">
        <div class="logo">JLS Race</div>
        <div class="level-badge" id="levelBadge">DSD1</div>
      </div>

      <div class="tab-row">
        <div class="tab-group">
          <button class="tab-btn active" onclick="setPeriod('monthly', this)">월간</button>
          <button class="tab-btn" onclick="setPeriod('semester', this)">학기누적</button>
        </div>
      </div>
    </div>

    <div class="top-right">
      <div class="user-pill" id="userInfo">김윤아 · CHESS</div>
      <button class="logout-btn" onclick="showLogin()">로그아웃</button>
    </div>
  </div>

  <div class="tab-row">
    <div></div>
    <div class="tab-group" id="examTabs">
      <button class="tab-btn" onclick="setExam('word', this)">단어</button>
      <button class="tab-btn active" onclick="setExam('grammar', this)">문법</button>
      <button class="tab-btn" onclick="setExam('chat', this)">CHAT</button>
    </div>
  </div>

  <div class="board">
    <div class="board-head">
      <div>
        <div class="board-title" id="boardTitle">문법 레이스</div>
        <div class="board-sub" id="boardSub">DSD1 레벨 학생 7명 경쟁 중</div>
      </div>
      <div class="board-summary" id="boardSummary">내 점수 95점 · 현재 4위 · 앞 친구와 15점 차</div>
    </div>

    <div class="main">
      <div class="rank-panel">
        <div class="rank-header" id="rankHeader">DSD1 월간 랭킹</div>
        <div class="rank-list" id="rankList"></div>
      </div>

      <div class="track-panel">
        <div class="track-stage">
          <canvas id="trackCanvas" width="900" height="380"></canvas>
        </div>

        <div class="cards">
          <div class="info-card dark">
            <div class="big" id="myCardTitle">김윤아 4위</div>
            <div class="small" id="myCardScore">2바퀴 420m</div>
          </div>
          <div class="info-card light">
            <div class="big" id="gapCardTop">1위 친구와 40점 차</div>
            <div class="small" id="gapCardPrev">앞 친구와 15점 차</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  const currentStudentId = "me";

  const students = [
    { id:"s1", name:"최하윤", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:460, grammar:97, chat:184 }, semester:{ word:1265, grammar:279, chat:530 } } },
    { id:"s2", name:"이유나", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:450, grammar:95, chat:180 }, semester:{ word:1210, grammar:270, chat:520 } } },
    { id:"s3", name:"한민준", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:435, grammar:92, chat:176 }, semester:{ word:1180, grammar:263, chat:500 } } },
    { id:"me", name:"김윤아", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:420, grammar:95, chat:172 }, semester:{ word:1160, grammar:258, chat:488 } } },
    { id:"s5", name:"송이안", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:410, grammar:88, chat:168 }, semester:{ word:1122, grammar:246, chat:476 } } },
    { id:"s6", name:"김서우", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:398, grammar:84, chat:162 }, semester:{ word:1105, grammar:240, chat:469 } } },
    { id:"s7", name:"유하선", type:"CHESS", level:"DSD1", profile:null, scores:{ monthly:{ word:372, grammar:79, chat:159 }, semester:{ word:1084, grammar:233, chat:460 } } }
  ];

  let currentPeriod = "monthly";
  let currentExam = "grammar";

  const examLabel = {
    word: "단어",
    grammar: "문법",
    chat: "CHAT"
  };

  function surname(name){
    return name ? name.charAt(0) : "?";
  }

  function avatarClass(index){
    const arr = ["c1","c2","c3","c4","c5"];
    return arr[index % arr.length];
  }

  function showRace(){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("racePage").classList.add("show");
    renderRace();
  }

  function showLogin(){
    document.getElementById("racePage").classList.remove("show");
    document.getElementById("loginPage").style.display = "flex";
  }

  function setPeriod(period, el){
    currentPeriod = period;
    document.querySelectorAll(".top-left .tab-btn").forEach(btn=>btn.classList.remove("active"));
    el.classList.add("active");
    renderRace();
  }

  function setExam(exam, el){
    currentExam = exam;
    document.querySelectorAll("#examTabs .tab-btn").forEach(btn=>btn.classList.remove("active"));
    el.classList.add("active");
    renderRace();
  }

  function getScore(student){
    return student.scores[currentPeriod][currentExam];
  }

  function renderRace(){
    const me = students.find(s=>s.id===currentStudentId);
    const group = students.filter(s=>s.level===me.level && s.type===me.type);
    const ranked = [...group].sort((a,b)=>getScore(b)-getScore(a));
    const myRank = ranked.findIndex(s=>s.id===me.id)+1;
    const myScore = getScore(me);
    const topScore = getScore(ranked[0]);
    const prevScore = myRank > 1 ? getScore(ranked[myRank-2]) : myScore;

    document.getElementById("levelBadge").textContent = me.level;
    document.getElementById("userInfo").textContent = `${me.name} · ${me.type}`;
    document.getElementById("boardTitle").textContent = `${examLabel[currentExam]} 레이스`;
    document.getElementById("boardSub").textContent = `${me.level} 레벨 학생 ${group.length}명 경쟁 중`;
    document.getElementById("boardSummary").textContent = `내 점수 ${myScore}점 · 현재 ${myRank}위 · 앞 친구와 ${Math.max(prevScore-myScore,0)}점 차`;
    document.getElementById("rankHeader").textContent = `${me.level} ${currentPeriod === "monthly" ? "월간" : "학기누적"} 랭킹`;

    document.getElementById("myCardTitle").textContent = `${me.name} ${myRank}위`;
    document.getElementById("myCardScore").textContent = scoreToTrackText(myScore);
    document.getElementById("gapCardTop").textContent = `1위 친구와 ${Math.max(topScore-myScore,0)}점 차`;
    document.getElementById("gapCardPrev").textContent = myRank > 1 ? `앞 친구와 ${Math.max(prevScore-myScore,0)}점 차` : "현재 1위";

    const rankList = document.getElementById("rankList");
    rankList.innerHTML = "";

    ranked.slice(0,5).forEach((s, idx)=>{
      rankList.appendChild(makeRankItem(s, idx+1, false));
    });

    if(myRank > 5){
      const dots = document.createElement("div");
      dots.className = "dots";
      dots.textContent = "···";
      rankList.appendChild(dots);
      rankList.appendChild(makeRankItem(me, myRank, true));
    } else {
      const items = rankList.querySelectorAll(".rank-item");
      items[myRank-1].classList.add("me");
    }

    drawTrack(ranked, me);
  }

  function makeRankItem(student, rank, forceMe){
    const me = student.id === currentStudentId || forceMe;
    const wrap = document.createElement("div");
    wrap.className = "rank-item" + (me ? " me" : "");

    const no = document.createElement("div");
    no.className = "rank-no";
    no.textContent = rank;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${avatarClass(rank-1)}`;

    if(student.profile){
      const img = document.createElement("img");
      img.src = student.profile;
      avatar.appendChild(img);
    } else {
      avatar.textContent = surname(student.name);
    }

    const info = document.createElement("div");
    info.className = "rank-info";

    const name = document.createElement("div");
    name.className = "rank-name";
    name.textContent = student.name;

    const sub = document.createElement("div");
    sub.className = "rank-sub";
    sub.textContent = me ? "내 현재 위치" : (currentPeriod === "monthly" ? "이번 달 점수" : "학기 누적");

    info.appendChild(name);
    info.appendChild(sub);

    const score = document.createElement("div");
    score.className = "rank-score";
    score.innerHTML = `<strong>${getScore(student)}</strong><span>points</span>`;

    wrap.appendChild(no);
    wrap.appendChild(avatar);
    wrap.appendChild(info);
    wrap.appendChild(score);

    return wrap;
  }

  function scoreToTrackText(score){
    const laps = Math.floor(score / 200);
    const remain = score % 200;
    return `${laps}바퀴 ${remain}m`;
  }

  function drawTrack(ranked, me){
    const canvas = document.getElementById("trackCanvas");
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0,0,w,h);

    const cx = w/2;
    const cy = h/2 - 10;
    const trackW = 420;
    const trackH = 150;
    const laneGap = 18;
    const topScore = getScore(ranked[0]);

    // track
    for(let i=0;i<5;i++){
      drawRoundedTrack(ctx, cx, cy, trackW - i*laneGap*2, trackH - i*laneGap*2, "#d99598");
      drawTrackStroke(ctx, cx, cy, trackW - i*laneGap*2, trackH - i*laneGap*2, "rgba(255,255,255,0.45)", 2);
    }

    // finish line
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 8, cy - trackH/2 + 8);
    ctx.lineTo(cx + 8, cy - 8);
    ctx.stroke();

    // flag
    const fx = cx + 8;
    const fy = cy - trackH/2 - 18;
    ctx.fillStyle = "#4e78d6";
    ctx.fillRect(fx, fy, 10, 10);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(fx+10, fy, 10, 10);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(fx, fy+10, 10, 10);
    ctx.fillStyle = "#4e78d6";
    ctx.fillRect(fx+10, fy+10, 10, 10);

    ranked.forEach((student, index)=>{
      const lane = index;
      const score = getScore(student);
      const t = topScore === 0 ? 0 : Math.max(0.07, score / topScore);
      const pos = getTrackPoint(cx, cy, trackW - lane*laneGap*2, trackH - lane*laneGap*2, t);
      drawAvatar(ctx, pos.x, pos.y, student, index, student.id === me.id);
    });
  }

  function drawAvatar(ctx, x, y, student, idx, isMe){
    const colors = ["#79cdb2","#7fa2ea","#d6b28f","#e6a3a5","#efc548"];
    const r = isMe ? 18 : 16;

    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = colors[idx % colors.length];
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#fff";
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = `800 ${isMe ? 18 : 16}px Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(surname(student.name), x, y+1);
  }

  function drawRoundedTrack(ctx, cx, cy, w, h, color){
    const r = h/2;
    ctx.beginPath();
    ctx.moveTo(cx - w/2 + r, cy - h/2);
    ctx.lineTo(cx + w/2 - r, cy - h/2);
    ctx.arc(cx + w/2 - r, cy, r, -Math.PI/2, Math.PI/2);
    ctx.lineTo(cx - w/2 + r, cy + h/2);
    ctx.arc(cx - w/2 + r, cy, r, Math.PI/2, -Math.PI/2);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawTrackStroke(ctx, cx, cy, w, h, color, width){
    const r = h/2;
    ctx.beginPath();
    ctx.moveTo(cx - w/2 + r, cy - h/2);
    ctx.lineTo(cx + w/2 - r, cy - h/2);
    ctx.arc(cx + w/2 - r, cy, r, -Math.PI/2, Math.PI/2);
    ctx.lineTo(cx - w/2 + r, cy + h/2);
    ctx.arc(cx - w/2 + r, cy, r, Math.PI/2, -Math.PI/2);
    ctx.closePath();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
  }

  function getTrackPoint(cx, cy, w, h, t){
    const r = h/2;
    const straight = w - h;
    const full = straight * 2 + Math.PI * h;
    let dist = t * full;

    if(dist <= straight){
      return { x: cx - straight/2 + dist, y: cy - h/2 };
    }
    dist -= straight;

    if(dist <= Math.PI*r){
      const a = -Math.PI/2 + (dist/(Math.PI*r))*Math.PI;
      return { x: cx + straight/2 + Math.cos(a)*r, y: cy + Math.sin(a)*r };
    }
    dist -= Math.PI*r;

    if(dist <= straight){
      return { x: cx + straight/2 - dist, y: cy + h/2 };
    }
    dist -= straight;

    const a = Math.PI/2 + (dist/(Math.PI*r))*Math.PI;
    return { x: cx - straight/2 + Math.cos(a)*r, y: cy + Math.sin(a)*r };
  }
</script>
