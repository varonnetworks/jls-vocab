<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 1 Unit 1</title>

<style>
*{box-sizing:border-box;}

html, body{
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  color:#202124;
  padding:20px;
}

.page{
  max-width:860px;
  margin:0 auto;
}

.back-row{
  margin-bottom:16px;
}

.back-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:14px;
  border:2px solid #eceaf3;
  background:#fff;
  font-size:22px;
  font-weight:900;
  color:#555;
  text-decoration:none;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

h1{
  margin:0 0 10px 0;
  font-size:42px;
  font-weight:900;
  line-height:1.15;
}

.progress{
  margin-bottom:16px;
  font-weight:800;
  color:#6a45b8;
}

.guide{
  display:flex;
  gap:10px;
  align-items:center;
  background:#fff;
  border:2px solid #eceaf3;
  border-radius:18px;
  padding:14px 16px;
  margin-bottom:16px;
  font-weight:700;
}

.top-wrap{
  position:sticky;
  top:0;
  background:#f5f6fa;
  padding:10px 0;
  z-index:100;
}

.top{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.filter-btn{
  appearance:none;
  -webkit-appearance:none;
  height:48px;
  border-radius:14px;
  border:2px solid #eceaf3;
  background:#fff;
  font-weight:800;
  font-size:14px;
  color:#303030;
  cursor:pointer;
  white-space:nowrap;
}

.filter-btn.active{
  background:#d9c2ff;
  border-color:#c9a9ff;
  color:#4d2ea8;
}

.list-wrap{
  background:#fff;
  border:4px solid #d7b9ff;
  border-radius:26px;
  padding:10px 12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.word-row{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:80px;
  padding:4px 2px;
  border-bottom:1px solid #eee;
}

.word-row:last-child{
  border-bottom:none;
}

.check-btn{
  appearance:none;
  -webkit-appearance:none;
  width:26px;
  height:26px;
  border-radius:50%;
  border:2px solid #ccc;
  background:#fff;
  cursor:pointer;
  position:relative;
  flex:0 0 26px;
}

.check-btn.checked{
  background:#d9c2ff;
  border-color:#d9c2ff;
}

.check-btn.checked::after{
  content:"✓";
  position:absolute;
  left:50%;
  top:48%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-size:15px;
  font-weight:900;
}

.word-main{
  flex:1;
  min-width:0;
  display:grid;
  grid-template-columns:minmax(170px,240px) minmax(0,1fr);
  column-gap:26px;
  align-items:center;
}

.word-box,
.meaning-box{
  min-width:0;
  width:100%;
  cursor:pointer;
}

.meaning-box{
  overflow:hidden;
}

.word-text{
  font-size:20px;
  font-weight:800;
  line-height:1.25;
  word-break:break-word;
}

.meaning-text{
  font-size:18px;
  line-height:1.3;
  color:#4a4a55;
  font-weight:700;
  text-align:left;
  word-break:keep-all;
  overflow-wrap:break-word;
  max-width:100%;
}

.placeholder{
  color:#bbb;
  font-size:13px;
  font-weight:700;
}

.speak-btn{
  appearance:none;
  -webkit-appearance:none;
  width:38px;
  height:38px;
  border-radius:12px;
  border:none;
  background:#f2f2f7;
  font-size:17px;
  cursor:pointer;
  flex:0 0 38px;
}

.bottom-nav{
  display:flex;
  justify-content:flex-end;
  margin-top:18px;
}

.next-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:0 16px;
  height:42px;
  border-radius:999px;
  background:#efe7ff;
  border:2px solid #dcc8ff;
  font-weight:800;
  font-size:15px;
  color:#6a45b8;
  text-decoration:none;
}

.empty-row{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:72px;
  color:#666;
  font-size:15px;
  font-weight:700;
}

@media (max-width:768px){
  body{
    padding:16px;
  }

  h1{
    font-size:28px;
  }

  .guide{
    padding:14px 16px;
    font-size:14px;
  }

  .filter-btn{
    height:46px;
    font-size:14px;
    border-radius:14px;
    padding:0 4px;
  }

  .word-row{
    min-height:82px;
    gap:10px;
  }

  .check-btn{
    width:28px;
    height:28px;
    flex:0 0 28px;
  }

  .check-btn.checked::after{
    font-size:16px;
  }

  .word-main{
    grid-template-columns:minmax(76px,104px) minmax(0,1fr);
    column-gap:10px;
  }

  .word-text{
    font-size:15px;
    line-height:1.2;
  }

  .meaning-text{
    font-size:14px;
    line-height:1.28;
  }

  .placeholder{
    font-size:12px;
  }

  .speak-btn{
    width:40px;
    height:40px;
    font-size:18px;
    border-radius:14px;
    flex:0 0 40px;
  }
}

@media (max-width:430px){
  body{
    padding:14px;
  }

  .top{
    gap:6px;
  }

  .filter-btn{
    height:42px;
    font-size:12px;
    border-radius:12px;
    padding:0 2px;
  }

  .word-main{
    grid-template-columns:minmax(70px,96px) minmax(0,1fr);
    column-gap:8px;
  }

  .word-text{
    font-size:15px;
  }

  .meaning-text{
    font-size:14px;
  }

  .speak-btn{
    width:38px;
    height:38px;
    font-size:17px;
    flex:0 0 38px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="back-row">
    <a class="back-btn" href="./index.html" aria-label="챕터 목록">‹</a>
  </div>

  <h1>Chapter 1 · Unit 2</h1>

  <div class="progress" id="progress"></div>

  <div class="guide">💡 모르는 단어를 체크하세요</div>

  <div class="top-wrap">
    <div class="top">
      <button class="filter-btn active" id="allBtn" type="button">전체</button>
      <button class="filter-btn" id="unknownBtn" type="button">모르는 단어</button>
      <button class="filter-btn" id="wordBtn" type="button">단어 숨기기</button>
      <button class="filter-btn" id="meaningBtn" type="button">뜻 숨기기</button>
    </div>
  </div>

  <div class="list-wrap" id="list"></div>

  <div class="bottom-nav">
    <a class="next-btn" href="./ch1u3.html">다음 unit ›</a>
  </div>

</div>

<script>
const STORAGE_KEY = "vocab_unknown_ch1u2";

const vocab = [
["exception","예외, 이례"],
["embrace","받아들이다"],
["adhere","고수하다"],
["chaotic","혼돈 상태인"],
["pivot","회전하다"],
["navigate","다루다, 처리하다"],
["initial","처음의, 초기의"],
["virtually","사실상, 거의"],
["phenomenal","경이적인, 경탄스러운"],
["amenity","생활 편의 시설"],
["workforce","노동 인구"],
["shutter","문을 닫다"],
["profitable","수익성이 있는"],
["adjusted","조절된"],
["thrive","번창하다"],
["alternative","대안"],
["appeal","관심을 끌다"],
["guarantee","보장하다"],
["interrupt","중단시키다, 방해하다"],
["individual","개인"],
["assume","추정하다, 맡다"],
["unprecedented","전례 없는"],
["unsustainable","지속 불가능한"],
["genuinely","진정으로"],
["explicitly","명쾌하게"],
["unique","유일무이한, 독특한"],
["temporary","일시적인, 임시의"],
["crisis","위기, 최악의 고비"],
["reception","반응, 평판"],
["catastrophe","참사, 재앙"]
];

let unknown = new Set(loadUnknown());
let filter = "all";
let mode = "none";
let revealedWords = new Set();
let revealedMeanings = new Set();
let englishVoices = [];

const list = document.getElementById("list");
const progress = document.getElementById("progress");
const allBtn = document.getElementById("allBtn");
const unknownBtn = document.getElementById("unknownBtn");
const wordBtn = document.getElementById("wordBtn");
const meaningBtn = document.getElementById("meaningBtn");

function loadUnknown(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    const parsed = JSON.parse(saved || "[]");
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}

function saveUnknown(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...unknown]));
}

function updateProgress(){
  progress.textContent = `모르는 단어 ${unknown.size} / ${vocab.length}`;
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function updateButtons(){
  allBtn.classList.toggle("active", filter === "all");
  unknownBtn.classList.toggle("active", filter === "unknown");
  wordBtn.classList.toggle("active", mode === "word");
  meaningBtn.classList.toggle("active", mode === "meaning");
}

function resetReveal(){
  revealedWords.clear();
  revealedMeanings.clear();
}

function render(){
  let html = "";

  vocab.forEach((item, i) => {
    if(filter === "unknown" && !unknown.has(i)) return;

    const word = item[0];
    const meaning = item[1];

    const wordHtml = mode === "word" && !revealedWords.has(i)
      ? `<div class="placeholder">탭하여 보기</div>`
      : `<div class="word-text">${escapeHtml(word)}</div>`;

    const meaningHtml = mode === "meaning" && !revealedMeanings.has(i)
      ? `<div class="placeholder">탭하여 보기</div>`
      : `<div class="meaning-text">${escapeHtml(meaning)}</div>`;

    html += `
      <div class="word-row">
        <button type="button" class="check-btn ${unknown.has(i) ? "checked" : ""}" data-check="${i}" aria-label="모르는 단어 체크"></button>

        <div class="word-main">
          <div class="word-box" data-word="${i}">
            ${wordHtml}
          </div>
          <div class="meaning-box" data-meaning="${i}">
            ${meaningHtml}
          </div>
        </div>

        <button type="button" class="speak-btn" data-speak="${escapeHtml(word)}" aria-label="발음 듣기">🔊</button>
      </div>
    `;
  });

  if(!html){
    html = `<div class="empty-row">체크된 모르는 단어가 없습니다.</div>`;
  }

  list.innerHTML = html;
  updateProgress();
  updateButtons();
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll("[data-check]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const i = Number(btn.dataset.check);

      if(unknown.has(i)) unknown.delete(i);
      else unknown.add(i);

      saveUnknown();
      render();
    };
  });

  document.querySelectorAll("[data-word]").forEach(box => {
    box.onclick = () => {
      if(mode !== "word") return;
      const i = Number(box.dataset.word);

      if(revealedWords.has(i)) revealedWords.delete(i);
      else revealedWords.add(i);

      render();
    };
  });

  document.querySelectorAll("[data-meaning]").forEach(box => {
    box.onclick = () => {
      if(mode !== "meaning") return;
      const i = Number(box.dataset.meaning);

      if(revealedMeanings.has(i)) revealedMeanings.delete(i);
      else revealedMeanings.add(i);

      render();
    };
  });

  document.querySelectorAll("[data-speak]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      speakWord(btn.dataset.speak);
    };
  });
}

allBtn.onclick = () => {
  filter = "all";
  render();
};

unknownBtn.onclick = () => {
  filter = "unknown";
  render();
};

wordBtn.onclick = () => {
  mode = mode === "word" ? "none" : "word";
  resetReveal();
  render();
};

meaningBtn.onclick = () => {
  mode = mode === "meaning" ? "none" : "meaning";
  resetReveal();
  render();
};

function setBestVoices(){
  if(!("speechSynthesis" in window)) return;
  const voices = window.speechSynthesis.getVoices();
  englishVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
}

function getBestVoice(){
  if(!englishVoices.length) return null;

  const preferredNames = [
    "Samantha",
    "Daniel",
    "Alex",
    "Karen",
    "Google US English",
    "Microsoft Aria Online",
    "Microsoft Jenny Online",
    "Microsoft Guy Online"
  ];

  for(const name of preferredNames){
    const found = englishVoices.find(v => v.name.includes(name));
    if(found) return found;
  }

  return englishVoices.find(v => v.lang.toLowerCase() === "en-us") || englishVoices[0];
}

function speakWord(word){
  if(!("speechSynthesis" in window)){
    alert("이 브라우저에서는 음성 기능을 지원하지 않습니다.");
    return;
  }

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = "en-US";
  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;

  const bestVoice = getBestVoice();
  if(bestVoice){
    utterance.voice = bestVoice;
    utterance.lang = bestVoice.lang;
  }

  setTimeout(() => {
    window.speechSynthesis.speak(utterance);
  }, 60);
}

if("speechSynthesis" in window){
  setBestVoices();
  window.speechSynthesis.onvoiceschanged = setBestVoices;
}

render();
</script>

</body>
</html>
