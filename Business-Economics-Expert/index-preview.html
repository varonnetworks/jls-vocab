<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business ＆ Economics Expert</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f5f6fa;
  padding:24px 16px 40px;
  margin:0;
  color:#222;
}

.container{
  max-width:820px;
  margin:0 auto;
}

.top{
  margin-bottom:18px;
}

.btn{
  display:inline-block;
  padding:11px 16px;
  border-radius:12px;
  border:1px solid #ddd;
  background:white;
  text-decoration:none;
  font-size:14px;
  color:#222;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
  transition:all 0.18s ease;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}

h1{
  margin:0;
  font-size:28px;
  line-height:1.25;
  font-weight:700;
}

.book-badge{
  flex-shrink:0;
  min-width:102px;
  height:38px;
  padding:0 14px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  font-weight:700;
  background:#ede4ff;
  color:#5b3cc4;
  border:1px solid #d7c5ff;
}

.chapter-list{
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* 챕터 카드 공통 */
.chapter-card{
  background:#fff;
  border-radius:22px;
  padding:18px 16px 14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  border:2px solid transparent;
}

/* 챕터별 테두리 색 차이 */
.chapter-1{
  border-color:#cab4ff;
}

.chapter-2{
  border-color:#b58cff;
}

.chapter-3{
  border-color:#8f5ae8;
}

/* 챕터 제목 */
.chapter-title{
  font-size:20px;
  font-weight:700;
  margin:0 0 14px 2px;
  line-height:1.3;
}

/* 유닛 버튼 */
.unit-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:#fff;
  border:1px solid #e6e6ea;
  border-radius:18px;
  padding:18px 18px;
  margin-bottom:10px;
  text-decoration:none;
  color:#222;
  font-size:18px;
  font-weight:500;
  box-shadow:0 3px 10px rgba(0,0,0,0.04);
  transition:all 0.18s ease;
}

.unit-item:last-child{
  margin-bottom:0;
}

.unit-item:hover{
  transform:translateY(-1px);
  box-shadow:0 7px 16px rgba(0,0,0,0.08);
}

.unit-text{
  line-height:1.35;
}

.unit-arrow{
  flex-shrink:0;
  font-size:28px;
  line-height:1;
  color:#a8a8b3;
}

/* 챕터별 hover 포인트 살짝 다르게 */
.chapter-1 .unit-item:hover{
  border-color:#d9c7ff;
}

.chapter-2 .unit-item:hover{
  border-color:#c09eff;
}

.chapter-3 .unit-item:hover{
  border-color:#9b73ea;
}

/* 모바일 */
@media (max-width:640px){
  body{
    padding:18px 12px 28px;
  }

  .btn{
    font-size:13px;
    padding:10px 14px;
    border-radius:11px;
  }

  .header{
    align-items:flex-start;
    flex-direction:column;
    gap:10px;
    margin-bottom:16px;
  }

  h1{
    font-size:22px;
  }

  .book-badge{
    min-width:96px;
    height:34px;
    font-size:14px;
  }

  .chapter-card{
    padding:16px 12px 12px;
    border-radius:20px;
  }

  .chapter-title{
    font-size:18px;
    margin-bottom:12px;
  }

  .unit-item{
    font-size:17px;
    padding:16px 16px;
    border-radius:16px;
  }

  .unit-arrow{
    font-size:24px;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="top">
    <a class="btn" href="../index.html">교재 전체 목록</a>
  </div>

  <div class="header">
    <h1>Business ＆ Economics</h1>
    <div class="book-badge">Expert</div>
  </div>

  <div class="chapter-list">

    <div class="chapter-card chapter-1">
      <h2 class="chapter-title">Chapter 1</h2>

      <a class="unit-item" href="ch1un1.html">
        <span class="unit-text">Unit 1</span>
        <span class="unit-arrow">›</span>
      </a>

      <a class="unit-item" href="ch1un2.html">
        <span class="unit-text">Unit 2</span>
        <span class="unit-arrow">›</span>
      </a>

      <a class="unit-item" href="ch1un3.html">
        <span class="unit-text">Unit 3</span>
        <span class="unit-arrow">›</span>
      </a>
    </div>

    <div class="chapter-card chapter-2">
      <h2 class="chapter-title">Chapter 2</h2>

      <a class="unit-item" href="ch2un1.html">
        <span class="unit-text">Unit 1</span>
        <span class="unit-arrow">›</span>
      </a>

      <a class="unit-item" href="ch2un2.html">
        <span class="unit-text">Unit 2</span>
        <span class="unit-arrow">›</span>
      </a>

      <a class="unit-item" href="ch2un3.html">
        <span class="unit-text">Unit 3</span>
        <span class="unit-arrow">›</span>
      </a>
    </div>

    <div class="chapter-card chapter-3">
      <h2 class="chapter-title">Chapter 3</h2>

      <a class="unit-item" href="ch3un1.html">
        <span class="unit-text">Unit 1</span>
        <span class="unit-arrow">›</span>
      </a>

      <a class="unit-item" href="ch3un2.html">
        <span class="unit-text">Unit 2</span>
        <span class="unit-arrow">›</span>
      </a>

      <a class="unit-item" href="ch3un3.html">
        <span class="unit-text">Unit 3</span>
        <span class="unit-arrow">›</span>
      </a>
    </div>

  </div>

</div>
</body>
</html>
