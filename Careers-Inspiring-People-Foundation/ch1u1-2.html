<script>
const API_ENDPOINT = "/api/grade-meaning";
const STORAGE_KEY = "vocab_unknown_" + location.pathname.split("/").pop().replace(".html","");

// [영어, 뜻, 품사]
const vocabList = [

["extremely","극도로","adv"],

["handle","다루다","verb"],
["unsafe","안전하지 못한","adj"],
["construction worker","공사현장 인부","noun"],
["logger","벌목꾼","noun"],
["interest","관심","noun"],
["hobby","취미","noun"],
["chemist","화학자","noun"],
["athlete","운동 선수","noun"],
["politician","정치인","noun"],
["inspiring","영감을 주는","adj"],
["stressful","스트레스가 많은","adj"],
["boring","재미없는, 지루한","adj"],
["difficult","어려운, 힘든","adj"],
["dangerous","위험한","adj"],
["permission","허락, 승인","noun"],
["expert","전문가","noun"],
["be concerned","우려하다","verb"],
["report","알리다, 보도하다","verb"],
["position","위치, 자리","noun"]
];

const grid = document.getElementById("grid");
const meaningBtn = document.getElementById("meaningBtn");
const wordBtn = document.getElementById("wordBtn");
const allBtn = document.getElementById("allBtn");
const unknownBtn = document.getElementById("unknownBtn");
const shuffleBtn = document.getElementById("shuffleBtn");
const testKrBtn = document.getElementById("testKrBtn");
const testEnBtn = document.getElementById("testEnBtn");
const progress = document.getElementById("progress");
const guide = document.getElementById("guide");
const bottomGradeBar = document.getElementById("bottomGradeBar");
const gradeBtn = document.getElementById("gradeBtn");
const cancelTestBtn = document.getElementById("cancelTestBtn");
const loadingBar = document.getElementById("loadingBar");
const scoreCard = document.getElementById("scoreCard");
const scrollFab = document.getElementById("scrollFab");
const fabArrow = document.getElementById("fabArrow");
const fabLine = document.getElementById("fabLine");

let meaningHidden = false;
let wordHidden = false;
let isSpeaking = false;
let speakTimer = null;
let englishVoices = [];

let filter = "all";
let testMode = null; // 'kr' | 'en' | null
let graded = false;
let isShuffled = false;

let unknown = new Set(loadUnknown());
let revealedMeaning = new Set();
let revealedWord = new Set();
let displayOrder = vocabList.map((_, i) => i);

let scrollTimer = null;
let lastScrollY = window.scrollY;
let scrollDirection = null; // 'up' | 'down'

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function loadUnknown(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    const parsed = JSON.parse(saved || "[]");
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}

function saveUnknown(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...unknown]));
}

function isSingleLongWord(word){
  return !word.includes(" ") && word.length >= 11;
}

function normalizeEnglish(str){
  return String(str || "").trim().toLowerCase();
}

function normalizeMeaning(str){
  return String(str || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[.,!?~\-_/()[\]{}"'`·]/g, "");
}

function editDistance(a, b){
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) =>
    Array.from({length:n+1}, (_,j) => i === 0 ? j : (j === 0 ? i : 0))
  );
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function detectKorPos(input){
  const s = String(input || "").trim();
  if(!s) return "unknown";

  if(/(하게|히|스럽게)$/.test(s)) return "adv";
  if(/(하다|되다|시키다|받다|막다|보다|내다|가다|오다|주다|입다|붙이다|놓다|구하다|대면하다|논의하다|보도하다|조작하다|가동하다|다루다|우려하다|알리다)$/.test(s)) return "verb";
  if(/(한|로운|스러운|적인|같은|된|있는|없는)$/.test(s)) return "adj";
  return "noun";
}

function isPosCompatible(answerPos, userPos){
  if(answerPos === userPos) return true;
  if(
    (answerPos === "adj" && userPos === "adv") ||
    (answerPos === "adv" && userPos === "adj")
  ) return true;
  return false;
}

function localMeaningGrade(userInput, answer, answerPos){
  if(!userInput) return { status: "wrong" };

  const userRaw = String(userInput).trim();
  const userPos = detectKorPos(userRaw);

  if(!isPosCompatible(answerPos, userPos)){
    return { status: "wrong" };
  }

  const userNorm = normalizeMeaning(userRaw);
  const answers = String(answer)
    .split(/[,，]/)
    .map(v => v.trim())
    .filter(Boolean);

  const normalizedAnswers = answers.map(v => normalizeMeaning(v));

  if(normalizedAnswers.includes(userNorm)){
    return { status: "correct" };
  }

  const softened = userNorm
    .replace(/하게$/,"한")
    .replace(/히$/,"한");

  for(const a of normalizedAnswers){
    if(a === softened) return { status: "correct" };
  }

  for(const a of normalizedAnswers){
    const maxDist = a.length <= 4 ? 1 : 2;
    if(editDistance(userNorm, a) <= maxDist){
      return { status: "correct" };
    }
  }

  return { status: "ai" };
}

function updateButtonLabels(){
  meaningBtn.textContent = meaningHidden ? "뜻 보이기" : "뜻 숨기기";
  wordBtn.textContent = wordHidden ? "영어 보이기" : "영어 숨기기";

  allBtn.classList.toggle("active", filter === "all");
  unknownBtn.classList.toggle("active", filter === "unknown");
  shuffleBtn.classList.toggle("active", isShuffled);
  testKrBtn.classList.toggle("active", testMode === "kr");
  testEnBtn.classList.toggle("active", testMode === "en");
}

function updateProgress(){
  progress.textContent = `모르는 단어 ${unknown.size} / ${vocabList.length}`;
}

function updateGuide(){
  if(testMode === "kr"){
    guide.textContent = "✏️ 영어 단어를 보고 뜻을 입력하세요 · 엔터키를 누르면 다음 문제로 이동해요";
    return;
  }
  if(testMode === "en"){
    guide.textContent = "✏️ 뜻을 보고 영어를 입력하세요 · 엔터키를 누르면 다음 문제로 이동해요";
    return;
  }
  guide.textContent = "💡 모르는 단어를 체크하거나 테스트를 시작해보세요";
}

function resetReveal(){
  revealedMeaning.clear();
  revealedWord.clear();
}

function resetScoreCard(){
  scoreCard.classList.remove("show");
  document.getElementById("scoreNum").textContent = "";
  document.getElementById("scorePct").textContent = "";
  document.getElementById("scoreMsg").textContent = "";
}

function shuffleDisplayOrder(){
  displayOrder = [...displayOrder].sort(() => Math.random() - 0.5);
  isShuffled = true;
}

function restoreOriginalOrder(){
  displayOrder = vocabList.map((_, i) => i);
  isShuffled = false;
}

function visibleIndices(){
  return filter === "unknown"
    ? displayOrder.filter(i => unknown.has(i))
    : displayOrder;
}

function startTest(type){
  testMode = type;
  graded = false;
  wordHidden = false;
  meaningHidden = false;
  resetReveal();
  shuffleDisplayOrder();
  resetScoreCard();
  updateGuide();
  updateButtonLabels();
  bottomGradeBar.classList.add("show");
  renderCards();
  setTimeout(() => focusFirstInput(), 60);
}

function endTest(){
  testMode = null;
  graded = false;
  loadingBar.classList.remove("show");
  bottomGradeBar.classList.remove("show");
  updateGuide();
  updateButtonLabels();
  renderCards();
}

function focusFirstInput(){
  const first = document.querySelector(".test-input");
  if(first) first.focus();
}

function focusNextInput(currentIndex){
  const inputs = [...document.querySelectorAll(".test-input")];
  const next = inputs[currentIndex + 1];
  if(next){
    next.focus();
    next.select();
  }else{
    gradeBtn.focus();
  }
}

function renderCards(){
  let html = "";
  const indices = visibleIndices();

  indices.forEach((vocabIndex, rowIndex) => {
    const [word, meaning, pos] = vocabList[vocabIndex];

    const showMeaning = !meaningHidden || revealedMeaning.has(vocabIndex);
    const showWord = !wordHidden || revealedWord.has(vocabIndex);

    const wordClass = isSingleLongWord(word) ? "word long-single" : "word";
    const wordHiddenClass = showWord ? "" : " hidden-text";
    const meaningHiddenClass = showMeaning ? "" : " hidden-text";

    let wordHtml = "";
    let meaningHtml = "";

    if(testMode === "kr"){
      wordHtml = `<div class="${wordClass}">${escapeHtml(word)}</div>`;
      meaningHtml = `
        <div class="answer-row">
          <input
            class="test-input"
            type="text"
            placeholder="뜻 입력..."
            data-row-index="${rowIndex}"
            data-vocab-index="${vocabIndex}"
            data-word="${escapeHtml(word)}"
            data-answer="${escapeHtml(meaning)}"
            data-pos="${escapeHtml(pos)}"
            autocomplete="off"
          >
        </div>
      `;
    }else if(testMode === "en"){
      wordHtml = `
        <div class="answer-row">
          <input
            class="test-input"
            type="text"
            placeholder="영어 입력..."
            data-row-index="${rowIndex}"
            data-vocab-index="${vocabIndex}"
            data-word="${escapeHtml(word)}"
            data-answer="${escapeHtml(word)}"
            data-pos="${escapeHtml(pos)}"
            autocomplete="off"
          >
        </div>
      `;
      meaningHtml = `<div class="meaning">${escapeHtml(meaning)}</div>`;
    }else{
      wordHtml = showWord
        ? `<div class="${wordClass}${wordHiddenClass}">${escapeHtml(word)}</div>`
        : `<div class="placeholder">탭하여 보기</div>`;

      meaningHtml = showMeaning
        ? `<div class="meaning${meaningHiddenClass}">${escapeHtml(meaning)}</div>`
        : `<div class="placeholder">탭하여 보기</div>`;
    }

    html += `
      <div class="card" data-vocab-index="${vocabIndex}">
        <div class="left">
          <button type="button" class="check-btn ${unknown.has(vocabIndex) ? "checked" : ""}" data-check="${vocabIndex}" ${testMode ? "disabled" : ""}></button>
          <div class="num">${rowIndex + 1}.</div>
          <div class="text-box">
            <div class="word-box" data-word="${vocabIndex}">
              ${wordHtml}
            </div>
            <div class="meaning-box" data-meaning="${vocabIndex}">
              ${meaningHtml}
            </div>
          </div>
        </div>
        <button type="button" class="speak-btn" data-word-speak="${escapeHtml(word)}">🔊</button>
      </div>
    `;
  });

  if(!html){
    html = `<div class="empty-row">표시할 단어가 없습니다.</div>`;
  }

  grid.innerHTML = html;
  bindEvents();
  updateProgress();
  updateButtonLabels();
}

function bindEvents(){
  document.querySelectorAll("[data-check]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if(testMode) return;
      const index = Number(btn.dataset.check);
      if(unknown.has(index)) unknown.delete(index);
      else unknown.add(index);
      saveUnknown();
      renderCards();
    });
  });

  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", function(e){
      if(testMode) return;
      const vocabIndex = Number(this.dataset.vocabIndex);

      if(e.target.closest(".speak-btn")) return;
      if(e.target.closest(".check-btn")) return;

      if(meaningHidden){
        if(revealedMeaning.has(vocabIndex)) revealedMeaning.delete(vocabIndex);
        else revealedMeaning.add(vocabIndex);
      }

      if(wordHidden){
        if(revealedWord.has(vocabIndex)) revealedWord.delete(vocabIndex);
        else revealedWord.add(vocabIndex);
      }

      if(meaningHidden || wordHidden){
        renderCards();
      }
    });
  });

  document.querySelectorAll("[data-word-speak]").forEach(btn => {
    btn.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();
      speakWord(this.dataset.wordSpeak);
    });
  });

  document.querySelectorAll(".test-input").forEach((input, idx) => {
    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        e.preventDefault();
        focusNextInput(idx);
      }
    });
  });
}

async function gradeAnswers(){
  if(graded) return;

  const inputs = [...document.querySelectorAll(".test-input")];
  if(inputs.length === 0) return;

  gradeBtn.disabled = true;
  loadingBar.classList.add("show");

  const pairs = inputs.map((inp, rowIndex) => ({
    rowIndex,
    vocabIndex: Number(inp.dataset.vocabIndex),
    word: inp.dataset.word,
    answer: inp.dataset.answer,
    pos: inp.dataset.pos,
    userInput: inp.value.trim()
  }));

  // 영어 시험: 100% 정확 일치
  if(testMode === "en"){
    const results = pairs.map((p, i) => ({
      id: i,
      correct: normalizeEnglish(p.userInput) === normalizeEnglish(p.answer)
    }));
    loadingBar.classList.remove("show");
    showResults(results, pairs);
    return;
  }

  // 뜻 시험: 로컬 선채점
  const localResults = pairs.map((p, i) => {
    const r = localMeaningGrade(p.userInput, p.answer, p.pos);
    return {
      id: i,
      correct: r.status === "correct",
      pendingAI: r.status === "ai"
    };
  });

  const needAI = pairs
    .map((p, i) => ({
      originalId: i,
      word: p.word,
      answer: p.answer,
      pos: p.pos,
      userInput: p.userInput
    }))
    .filter((item, i) => localResults[i].pendingAI && item.userInput.length > 0);

  if(needAI.length > 0){
    try{
      const res = await fetch(API_ENDPOINT, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ items: needAI })
      });

      if(!res.ok) throw new Error("채점 API 호출 실패");

      const data = await res.json();
      const aiResults = Array.isArray(data.results) ? data.results : [];

      aiResults.forEach(r => {
        if(typeof r.originalId === "number"){
          localResults[r.originalId].correct = !!r.correct;
          localResults[r.originalId].pendingAI = false;
        }
      });

      localResults.forEach(r => {
        if(r.pendingAI){
          r.correct = false;
          r.pendingAI = false;
        }
      });
    }catch(e){
      localResults.forEach(r => {
        if(r.pendingAI){
          r.correct = false;
          r.pendingAI = false;
        }
      });
    }
  }

  loadingBar.classList.remove("show");
  showResults(localResults, pairs);
}

function showResults(results, pairs){
  graded = true;
  gradeBtn.disabled = false;

  const cards = [...document.querySelectorAll(".card")];
  let correctCount = 0;

  results.forEach(r => {
    const card = cards[r.id];
    if(!card) return;

    const input = card.querySelector(".test-input");
    const checkBtn = card.querySelector(".check-btn");
    const textBox = card.querySelector(".text-box");

    if(r.correct){
      correctCount++;
      card.classList.add("correct");
      if(input){
        input.classList.add("correct-input");
        input.disabled = true;
      }
      if(checkBtn){
        checkBtn.className = "check-btn result-correct";
      }
    }else{
      card.classList.add("wrong");
      if(input){
        input.classList.add("wrong-input");
        input.disabled = true;
      }
      if(checkBtn){
        checkBtn.className = "check-btn result-wrong";
      }
      if(textBox && !textBox.querySelector(".answer-label")){
        const label = document.createElement("div");
        label.className = "answer-label wrong-label";
        label.textContent = `정답: ${pairs[r.id].answer}`;
        textBox.appendChild(label);
      }
    }
  });

  const total = pairs.length;
  const pct = Math.round((correctCount / total) * 100);
  const msgs = [
    "더 열심히 해봐요! 💪",
    "조금 더 하면 될 것 같아요! 🔥",
    "절반 넘겼어요! 👍",
    "잘하고 있어요! ⭐",
    "거의 다 맞았어요! 🎉",
    "완벽해요! 🏆"
  ];
  const msgIdx = Math.min(Math.floor(pct / 20), 5);

  document.getElementById("scoreNum").textContent = `${correctCount} / ${total}`;
  document.getElementById("scorePct").textContent = `정답률 ${pct}%`;
  document.getElementById("scoreMsg").textContent = msgs[msgIdx];
  scoreCard.classList.add("show");
}

function speakWord(word){
  if(!("speechSynthesis" in window)){
    alert("이 브라우저에서는 음성 기능을 지원하지 않습니다.");
    return;
  }

  if(speakTimer){
    clearTimeout(speakTimer);
    speakTimer = null;
  }

  try{
    window.speechSynthesis.cancel();
  }catch(e){}

  isSpeaking = false;

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = "en-US";
  utterance.rate = 1;
  utterance.pitch = 1;
  utterance.volume = 1;

  const bestVoice = getBestVoice();
  if(bestVoice){
    utterance.voice = bestVoice;
    utterance.lang = bestVoice.lang;
  }

  utterance.onstart = function(){ isSpeaking = true; };
  utterance.onend = function(){ isSpeaking = false; };
  utterance.onerror = function(){ isSpeaking = false; };

  speakTimer = setTimeout(function(){
    if(!isSpeaking){
      window.speechSynthesis.speak(utterance);
    }
    speakTimer = null;
  }, 80);
}

function setBestVoices(){
  if(!("speechSynthesis" in window)) return;
  const voices = window.speechSynthesis.getVoices();
  englishVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
}

function getBestVoice(){
  if(!englishVoices.length) return null;
  const preferredNames = [
    "Samantha","Daniel","Alex","Karen",
    "Google US English",
    "Microsoft Aria Online",
    "Microsoft Jenny Online",
    "Microsoft Guy Online"
  ];
  for(const name of preferredNames){
    const found = englishVoices.find(v => v.name.includes(name));
    if(found) return found;
  }
  return englishVoices.find(v => v.lang.toLowerCase() === "en-us") || englishVoices[0];
}

function updateScrollFab(direction){
  scrollDirection = direction;
  if(direction === "up"){
    // 위로 이동
    fabArrow.setAttribute("d","M6 14l6-6 6 6");
    fabLine.setAttribute("d","M6 19h12");
  }else{
    // 아래로 이동
    fabArrow.setAttribute("d","M6 10l6 6 6-6");
    fabLine.setAttribute("d","M6 19h12");
  }
  scrollFab.classList.add("show");

  if(scrollTimer) clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    scrollFab.classList.remove("show");
  }, 900);
}

window.addEventListener("scroll", () => {
  const y = window.scrollY;
  const diff = y - lastScrollY;

  if(Math.abs(diff) >= 32){
    if(diff > 0){
      updateScrollFab("up");
    }else{
      updateScrollFab("down");
    }
  }

  lastScrollY = y;
});

scrollFab.addEventListener("click", () => {
  if(scrollDirection === "up"){
    window.scrollTo({ top: 0, behavior: "smooth" });
  }else{
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  }
});
