<style>

.filter-btn.active{

  height:26px;
  border-radius:50%;
  border:2px solid #ccc;
  background:#fff;
  cursor:pointer;

}

.check-btn.checked{

  border-color:#ffe9a8;
}

.check-btn.checked::after{
  content:"✓";
  position:absolute;
  left:50%;
  top:48%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-size:15px;

}

.check-btn.result-correct{
  background:#4caf50;
  border-color:#4caf50;
}

.check-btn.result-correct::after{
  content:"✓";
  position:absolute;

  top:48%;

.check-btn.result-wrong::after{

  top:48%;

.meaning-box{

<script>
const API_ENDPOINT = "https://jls-vocab.vercel.app/api/grade-meaning";
const STORAGE_KEY = "vocab_unknown_" + location.pathname.split("/").pop().replace(".html","");

// ③ 여기 단어 목록 변경 (품사: noun/verb/adj/adv/conj)
const vocab = [
["professional","전문가","noun"],
["require","필요하다","verb"],
["risky","위험한","adj"],
["save","(위험 등에서) 구하다","verb"],
["extremely","극도로","adv"],
["role","역할","noun"],
["operate","조작하다, 가동하다","verb"],
["mind","상관하다, 개의하다","verb"],
["license","면허","noun"],
["face","대면하다","verb"],
["responsibility","책임","noun"],
["career","직업","noun"],
["cover","취재하다, 보도하다","verb"],
["rewarding","보람 있는","adj"],
["interview","인터뷰","noun"],
["discuss","논의하다","verb"],
["venom","(뱀 등의) 독","noun"],

["reporter","리포터, 기자","noun"],
["extract","추출하다","verb"],
["handle","다루다","verb"],
["unsafe","안전하지 못한","adj"],
["construction worker","공사현장 인부","noun"],
["logger","벌목꾼","noun"],
["interest","관심","noun"],
["hobby","취미","noun"],
["chemist","화학자","noun"],
["athlete","운동 선수","noun"],
["politician","정치인","noun"],
["inspiring","영감을 주는","adj"],
["stressful","스트레스가 많은","adj"],
["boring","재미없는, 지루한","adj"],
["difficult","어려운, 힘든","adj"],
["dangerous","위험한","adj"],
["permission","허락, 승인","noun"],
["expert","전문가","noun"],
["be concerned","우려하다","verb"],
["report","알리다, 보도하다","verb"],
["position","위치, 자리","noun"]
];

let unknown = new Set(loadUnknown());
let filter = "all";
let mode = "none";
let testMode = null;
let graded = false;
let revealedWords = new Set();
let revealedMeanings = new Set();
let englishVoices = [];
let displayOrder = vocab.map((_,i) => i);
let speakTimer = null;
let isSpeaking = false;

const list = document.getElementById("list");
const progress = document.getElementById("progress");
const guide = document.getElementById("guide");
const allBtn = document.getElementById("allBtn");
const unknownBtn = document.getElementById("unknownBtn");
const wordBtn = document.getElementById("wordBtn");
const meaningBtn = document.getElementById("meaningBtn");
const shuffleBtn = document.getElementById("shuffleBtn");
const testKrBtn = document.getElementById("testKrBtn");
const testEnBtn = document.getElementById("testEnBtn");
const scoreCard = document.getElementById("scoreCard");
const scoreNum = document.getElementById("scoreNum");
const scorePct = document.getElementById("scorePct");
const scoreMsg = document.getElementById("scoreMsg");
const bottomGradeBar = document.getElementById("bottomGradeBar");
const gradeBtn = document.getElementById("gradeBtn");
const cancelTestBtn = document.getElementById("cancelTestBtn");
const retryBtn = document.getElementById("retryBtn");
const loadingBar = document.getElementById("loadingBar");

function loadUnknown(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    const parsed = JSON.parse(saved || "[]");
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){ return []; }
}

function saveUnknown(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...unknown]));
}

function updateProgress(){
  progress.textContent = `모르는 단어 ${unknown.size} / ${vocab.length}`;
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function updateButtons(){
  allBtn.classList.toggle("active", filter === "all");
  unknownBtn.classList.toggle("active", filter === "unknown");
  wordBtn.classList.toggle("active", mode === "word");
  meaningBtn.classList.toggle("active", mode === "meaning");
  shuffleBtn.classList.remove("active");
  testKrBtn.classList.toggle("active", testMode === "kr");
  testEnBtn.classList.toggle("active", testMode === "en");
  testEnBtn.textContent = "단어 테스트";
  testKrBtn.textContent = "뜻 테스트";
}

function updateGuide(){
  if(testMode === "kr"){
    guide.textContent = "✏️ 영어 단어를 보고 뜻을 입력하세요. 엔터를 누르면 다음 문제로 이동해요.";
    return;
  }
  if(testMode === "en"){
    guide.textContent = "✏️ 뜻을 보고 영어를 입력하세요. 엔터를 누르면 다음 문제로 이동해요.";
    return;
  }
  guide.textContent = "💡 모르는 단어를 체크하세요";
}

function resetReveal(){
  revealedWords.clear();
  revealedMeanings.clear();
}

function resetScore(){
  scoreCard.classList.remove("show");
  scoreNum.textContent = "";
  scorePct.textContent = "";
  scoreMsg.textContent = "";
}

function shuffleOrder(){
  displayOrder = [...displayOrder].sort(() => Math.random() - 0.5);
}

function normalizeEnglish(str){
  return String(str || "").trim().toLowerCase();
}

function normalizeMeaning(str){
  return String(str || "")
    .trim()
    .toLowerCase()
    .replace(/\([^)]*\)/g,"")
    .replace(/\s+/g,"")
    .replace(/[.,!?~\-_/()[\]{}"'`·]/g,"");
}

function editDistance(a, b){
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) =>
    Array.from({length:n+1}, (_,j) => i===0?j:(j===0?i:0))
  );
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1]
        ? dp[i-1][j-1]
        : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function detectKorPos(input){
  const s = String(input||"").trim();
  if(!s) return "unknown";
  // 접속사/관계사 패턴 → conj (AI한테 넘김)
  if(/(인지|이든|아니든|거나|지만|해서|므로|니까|도록|려고|위해|위하여)$/.test(s)) return "conj";
  if(/(하게|히|스럽게)$/.test(s)) return "adv";
  if(/(하다|되다|시키다|받다|막다|보다|내다|가다|오다|주다|입다|붙이다|놓다|구하다)$/.test(s)) return "verb";
  if(/(한|로운|스러운|적인|같은|된|있는|없는|많은|적은|높은|낮은|좋은|나쁜|큰|작은|긴|짧은|넓은|좁은)$/.test(s)) return "adj";
  return "noun";
}

function isPosCompatible(answerPos, userPos){
  if(answerPos === userPos) return true;
  // 형용사↔부사 허용
  if((answerPos==="adj"&&userPos==="adv")||(answerPos==="adv"&&userPos==="adj")) return true;
  // conj는 판단 어려우니 AI한테 넘김
  if(answerPos==="conj" || userPos==="conj") return true;
  return false;
}

function localMeaningGrade(userInput, answer, answerPos){
  if(!userInput) return { status:"wrong" };
  const userRaw = String(userInput).trim();
  const userNorm = normalizeMeaning(userRaw);
  const answers = String(answer).split(/[,，]/).map(v=>v.trim()).filter(Boolean);
  const normalizedAnswers = answers.map(v=>normalizeMeaning(v));

  // 1. 정확 일치
  if(normalizedAnswers.includes(userNorm)) return { status:"correct" };

  // 2. 형용사↔부사 softening
  const softened = userNorm.replace(/하게$/,"한").replace(/히$/,"한");
  for(const a of normalizedAnswers){
    if(a===softened) return { status:"correct" };
  }

  // 3. 오타 허용 (편집 거리)
  for(const a of normalizedAnswers){
    const maxDist = a.length<=4?1:2;
    if(editDistance(userNorm,a)<=maxDist) return { status:"correct" };
  }

  // 4. 품사 불일치 → 오답 (conj는 통과시켜 AI로)
  const userPos = detectKorPos(userRaw);
  if(!isPosCompatible(answerPos, userPos)) return { status:"wrong" };

  // 5. 그 외 → AI 판단
  return { status:"ai" };
}

const SESSION_KEY_EN = STORAGE_KEY + "_session_en";
const SESSION_KEY_KR = STORAGE_KEY + "_session_kr";

function saveSession(data){
  const key = data.testMode === "en" ? SESSION_KEY_EN : SESSION_KEY_KR;
  try{ localStorage.setItem(key, JSON.stringify(data)); }catch(e){}
}

function loadSession(type){
  const key = type === "en" ? SESSION_KEY_EN : SESSION_KEY_KR;
  try{
    const saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : null;
  }catch(e){ return null; }
}

function clearSession(type){
  if(!type || type === "en") localStorage.removeItem(SESSION_KEY_EN);
  if(!type || type === "kr") localStorage.removeItem(SESSION_KEY_KR);
}

function visibleIndices(){
  return filter==="unknown"
    ? displayOrder.filter(i=>unknown.has(i))
    : displayOrder;
}

function showGradeBar(){
  gradeBtn.style.display = "";
  cancelTestBtn.style.display = "";
  retryBtn.style.display = "none";
  bottomGradeBar.classList.add("show");
}

function showRetryBar(){
  gradeBtn.style.display = "none";
  cancelTestBtn.style.display = "none";
  retryBtn.style.display = "";
  bottomGradeBar.classList.add("show");
}

function hideGradeBar(){
  bottomGradeBar.classList.remove("show");
}

function restoreSession(session){
  const msgs = ["더 열심히 해봐요! 💪","조금 더 하면 될 것 같아요! 🔥","절반 넘겼어요! 👍","잘하고 있어요! ⭐","거의 다 맞았어요! 🎉","완벽해요! 🏆"];
  testMode = session.testMode;
  graded = true;
  displayOrder = session.displayOrder || displayOrder;
  resetScore();
  updateGuide();
  updateButtons();
  scoreNum.textContent = `${session.correctCount} / ${session.total}`;
  scorePct.textContent = `정답률 ${session.pct}%`;
  scoreMsg.textContent = msgs[session.msgIdx];
  scoreCard.classList.add("show");
  showRetryBar();
  render();
  setTimeout(()=>{
    const rows = [...document.querySelectorAll(".word-row")];
    session.results.forEach(r=>{
      const row = rows[r.id];
      if(!row) return;
      const input = row.querySelector(".test-input");
      const checkBtn = row.querySelector(".check-btn");
      const textBox = row.querySelector(".word-main");
      const pair = session.pairs[r.id];
      if(input && pair){ input.value = pair.userInput; input.disabled = true; }
      if(r.correct){
        row.classList.add("correct");
        if(input) input.classList.add("correct-input");
        if(checkBtn) checkBtn.className="check-btn result-correct";
      }else{
        row.classList.add("wrong");
        if(input) input.classList.add("wrong-input");
        if(checkBtn) checkBtn.className="check-btn result-wrong";
        if(textBox && !textBox.querySelector(".answer-label") && pair){
          const label = document.createElement("div");
          label.className = "answer-label wrong-label";
          label.style.gridColumn = "1 / -1";
          label.textContent = `정답: ${pair.answer}`;
          textBox.appendChild(label);
        }
      }
    });
    window.scrollTo({ top:0, behavior:"smooth" });
  }, 50);
}

function startTest(type){
  testMode = type;
  graded = false;
  mode = "none";
  resetReveal();
  resetScore();
  clearSession(type);
  shuffleOrder();
  showGradeBar();
  updateGuide();
  updateButtons();
  render();
  setTimeout(()=>focusFirstInput(), 80);
}

function cancelTest(){
  const type = testMode;
  testMode = null;
  graded = false;
  loadingBar.classList.remove("show");
  hideGradeBar();
  clearSession(type);
  resetScore();
  updateGuide();
  updateButtons();
  render();
}

function focusFirstInput(){
  const first = document.querySelector(".test-input");
  if(first) first.focus();
}

function focusNextInput(currentIndex){
  const inputs = [...document.querySelectorAll(".test-input")];
  const next = inputs[currentIndex+1];
  if(next){ next.focus(); next.select(); }
  else gradeBtn.focus();
}

async function gradeAnswers(){
  if(graded) return;
  const inputs = [...document.querySelectorAll(".test-input")];
  if(inputs.length===0) return;
  gradeBtn.disabled = true;
  loadingBar.classList.add("show");

  const pairs = inputs.map((inp,rowIndex)=>({
    rowIndex,
    vocabIndex: Number(inp.dataset.vocabIndex),
    word: inp.dataset.word,
    answer: inp.dataset.answer,
    pos: inp.dataset.pos,
    userInput: inp.value.trim()
  }));

  if(testMode==="en"){
    const results = pairs.map((p,i)=>({
      id: i,
      correct: normalizeEnglish(p.userInput)===normalizeEnglish(p.answer)
    }));
    loadingBar.classList.remove("show");
    showResults(results, pairs);
    return;
  }

  const localResults = pairs.map((p,i)=>{
    const r = localMeaningGrade(p.userInput, p.answer, p.pos);
    return { id:i, correct:r.status==="correct", pendingAI:r.status==="ai" };
  });

  const needAI = pairs
    .map((p,i)=>({ originalId:i, word:p.word, answer:p.answer, pos:p.pos, userInput:p.userInput }))
    .filter((item,i)=>localResults[i].pendingAI && item.userInput.length>0);

  if(needAI.length>0){
    try{
      const res = await fetch(API_ENDPOINT, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({items:needAI})
      });
      if(!res.ok) throw new Error("채점 API 호출 실패");
      const data = await res.json();
      const aiResults = Array.isArray(data.results)?data.results:[];
      aiResults.forEach(r=>{
        if(typeof r.originalId==="number"){
          localResults[r.originalId].correct = !!r.correct;
          localResults[r.originalId].pendingAI = false;
        }
      });
      localResults.forEach(r=>{ if(r.pendingAI){ r.correct=false; r.pendingAI=false; } });
    }catch(e){
      localResults.forEach(r=>{ if(r.pendingAI){ r.correct=false; r.pendingAI=false; } });
    }
  }

  loadingBar.classList.remove("show");
  showResults(localResults, pairs);
}

function showResults(results, pairs){
  graded = true;
  gradeBtn.disabled = false;
  const rows = [...document.querySelectorAll(".word-row")];
  let correctCount = 0;

  results.forEach(r=>{
    const row = rows[r.id];
    if(!row) return;
    const input = row.querySelector(".test-input");
    const checkBtn = row.querySelector(".check-btn");
    const textBox = row.querySelector(".word-main");

    if(r.correct){
      correctCount++;
      row.classList.add("correct");
      if(input){ input.classList.add("correct-input"); input.disabled=true; }
      if(checkBtn) checkBtn.className="check-btn result-correct";
    }else{
      row.classList.add("wrong");
      if(input){ input.classList.add("wrong-input"); input.disabled=true; }
      if(checkBtn) checkBtn.className="check-btn result-wrong";
      if(textBox && !textBox.querySelector(".answer-label")){
        const label = document.createElement("div");
        label.className = "answer-label wrong-label";
        label.style.gridColumn = "1 / -1";
        label.textContent = `정답: ${pairs[r.id].answer}`;
        textBox.appendChild(label);
      }
    }
  });

  const total = pairs.length;
  const pct = Math.round((correctCount/total)*100);
  const msgs = ["더 열심히 해봐요! 💪","조금 더 하면 될 것 같아요! 🔥","절반 넘겼어요! 👍","잘하고 있어요! ⭐","거의 다 맞았어요! 🎉","완벽해요! 🏆"];
  const msgIdx = Math.min(Math.floor(pct/20),5);
  scoreNum.textContent = `${correctCount} / ${total}`;
  scorePct.textContent = `정답률 ${pct}%`;
  scoreMsg.textContent = msgs[msgIdx];
  scoreCard.classList.add("show");

  saveSession({
    testMode,
    displayOrder: [...displayOrder],
    correctCount, total, pct, msgIdx,
    savedAt: Date.now(),
    results: results.map(r=>({ id:r.id, correct:r.correct })),
    pairs: pairs.map(p=>({ word:p.word, answer:p.answer, userInput:p.userInput }))
  });

  window.scrollTo({ top:0, behavior:"smooth" });
  showRetryBar();
}

function render(){
  let html = "";
  const indices = visibleIndices();

  indices.forEach((i,rowIdx)=>{
    const [word, meaning, pos] = vocab[i];

    const wordHtml = mode==="word" && !revealedWords.has(i)
      ? `<div class="placeholder">탭하여 보기</div>`
      : `<div class="word-text">${escapeHtml(word)}</div>`;

    const meaningHtml = mode==="meaning" && !revealedMeanings.has(i)
      ? `<div class="placeholder">탭하여 보기</div>`
      : `<div class="meaning-text">${escapeHtml(meaning)}</div>`;

    let leftWord = wordHtml;
    let rightMeaning = meaningHtml;

    if(testMode==="kr"){
      leftWord = `<div class="word-text">${escapeHtml(word)}</div>`;
      rightMeaning = `<input class="test-input" type="text" placeholder="뜻 입력..." data-row-index="${rowIdx}" data-vocab-index="${i}" data-word="${escapeHtml(word)}" data-answer="${escapeHtml(meaning)}" data-pos="${escapeHtml(pos)}" autocomplete="off">`;
    }else if(testMode==="en"){
      leftWord = `<input class="test-input" type="text" placeholder="영어 입력..." data-row-index="${rowIdx}" data-vocab-index="${i}" data-word="${escapeHtml(word)}" data-answer="${escapeHtml(word)}" data-pos="${escapeHtml(pos)}" autocomplete="off">`;
      rightMeaning = `<div class="meaning-text">${escapeHtml(meaning)}</div>`;
    }

    html += `
      <div class="word-row">
        <button type="button" class="check-btn ${unknown.has(i)?"checked":""}" data-check="${i}" ${testMode?"disabled":""} aria-label="모르는 단어 체크"></button>
        <div class="word-main">
          <div class="word-box" data-word="${i}">${leftWord}</div>
          <div class="meaning-box" data-meaning="${i}">${rightMeaning}</div>
        </div>
        <button type="button" class="speak-btn" data-speak="${escapeHtml(word)}" aria-label="발음 듣기">🔊</button>
      </div>
    `;
  });

  if(!html) html = `<div class="empty-row">체크된 모르는 단어가 없습니다.</div>`;

  list.innerHTML = html;
  updateProgress();
  updateButtons();
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll("[data-check]").forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      if(testMode) return;
      const i = Number(btn.dataset.check);
      if(unknown.has(i)) unknown.delete(i);
      else unknown.add(i);
      saveUnknown();
      render();
    };
  });

  document.querySelectorAll("[data-word]").forEach(box=>{
    box.onclick = ()=>{
      if(mode!=="word"||testMode) return;
      const i = Number(box.dataset.word);
      if(revealedWords.has(i)) revealedWords.delete(i);
      else revealedWords.add(i);
      render();
    };
  });

  document.querySelectorAll("[data-meaning]").forEach(box=>{
    box.onclick = ()=>{
      if(mode!=="meaning"||testMode) return;
      const i = Number(box.dataset.meaning);
      if(revealedMeanings.has(i)) revealedMeanings.delete(i);
      else revealedMeanings.add(i);
      render();
    };
  });

  document.querySelectorAll("[data-speak]").forEach(btn=>{
    btn.onclick = (e)=>{ e.stopPropagation(); speakWord(btn.dataset.speak); };
  });

  document.querySelectorAll(".test-input").forEach((input,idx)=>{
    input.addEventListener("keydown", function(e){
      if(e.key==="Enter"){ e.preventDefault(); focusNextInput(idx); }
    });
  });
}

allBtn.onclick = ()=>{
  if(testMode){
    testMode = null;
    graded = false;
    loadingBar.classList.remove("show");
    hideGradeBar();
    resetScore();
    updateGuide();
  }
  filter = "all";
  render();
};

unknownBtn.onclick = ()=>{
  if(testMode){
    testMode = null;
    graded = false;
    loadingBar.classList.remove("show");
    hideGradeBar();
    resetScore();
    updateGuide();
  }
  filter = "unknown";
  render();
};

retryBtn.onclick = ()=>{
  const type = testMode || (loadSession("en") ? "en" : "kr");
  startTest(type);
};

wordBtn.onclick = ()=>{
  if(testMode) return;
  mode = mode==="word"?"none":"word";
  resetReveal();
  render();
};

meaningBtn.onclick = ()=>{
  if(testMode) return;
  mode = mode==="meaning"?"none":"meaning";
  resetReveal();
  render();
};

shuffleBtn.onclick = ()=>{
  if(testMode) return;
  shuffleOrder();
  render();
};

testEnBtn.onclick = ()=>{
  const session = loadSession("en");
  if(session) restoreSession(session);
  else startTest("en");
};
testKrBtn.onclick = ()=>{
  const session = loadSession("kr");
  if(session) restoreSession(session);
  else startTest("kr");
};
gradeBtn.onclick = ()=>gradeAnswers();
cancelTestBtn.onclick = ()=>cancelTest();
retryBtn.onclick = ()=>{
  const type = testMode || (loadSession("en") ? "en" : "kr");
  startTest(type);
};

function setBestVoices(){
  if(!("speechSynthesis" in window)) return;
  const voices = window.speechSynthesis.getVoices();
  englishVoices = voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en"));
}

function getBestVoice(){
  if(!englishVoices.length) return null;
  const preferredNames = ["Samantha","Daniel","Alex","Karen","Google US English","Microsoft Aria Online","Microsoft Jenny Online","Microsoft Guy Online"];
  for(const name of preferredNames){
    const found = englishVoices.find(v=>v.name.includes(name));
    if(found) return found;
  }
  return englishVoices.find(v=>v.lang.toLowerCase()==="en-us")||englishVoices[0];
}

function speakWord(word){
  if(!("speechSynthesis" in window)){
    alert("이 브라우저에서는 음성 기능을 지원하지 않습니다.");
    return;
  }
  if(speakTimer){ clearTimeout(speakTimer); speakTimer=null; }
  try{ window.speechSynthesis.cancel(); }catch(e){}
  isSpeaking = false;
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = "en-US";
  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;
  const bestVoice = getBestVoice();
  if(bestVoice){ utterance.voice=bestVoice; utterance.lang=bestVoice.lang; }
  utterance.onstart = ()=>{ isSpeaking=true; };
  utterance.onend = ()=>{ isSpeaking=false; };
  utterance.onerror = ()=>{ isSpeaking=false; };
  speakTimer = setTimeout(()=>{
    if(!isSpeaking) window.speechSynthesis.speak(utterance);
    speakTimer = null;
  }, 60);
}

if("speechSynthesis" in window){
  setBestVoices();
  window.speechSynthesis.onvoiceschanged = setBestVoices;
}

updateProgress();
updateGuide();
updateButtons();
render();

const savedSessionEn = loadSession("en");
const savedSessionKr = loadSession("kr");
const latestSession = (savedSessionEn && savedSessionKr)
  ? (savedSessionEn.savedAt > savedSessionKr.savedAt ? savedSessionEn : savedSessionKr)
  : (savedSessionEn || savedSessionKr);

if(latestSession) restoreSession(latestSession);
</script>
