<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLS Vocabulary</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  margin:0;
  padding:24px;
  color:#111;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
}

h1{
  margin:0 0 8px 0;
  font-size:30px;
}

.desc{
  margin:0 0 20px 0;
  color:#666;
  font-size:15px;
  line-height:1.5;
}

.search-box{
  position:sticky;
  top:0;
  z-index:50;
  background:#f5f6fa;
  padding:0 0 16px 0;
  margin-bottom:8px;
}

.search{
  width:100%;
  padding:14px 16px;
  border:1px solid #dcdfe6;
  border-radius:14px;
  font-size:15px;
  outline:none;
  background:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.search:focus{
  border-color:#b9c4d6;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
}

.card{
  display:block;
  text-decoration:none;
  color:#111;
  background:#fff;
  border:1px solid #e2e2e2;
  border-radius:18px;
  padding:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.05);
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.thumb{
  width:100%;
  aspect-ratio:3 / 4;
  object-fit:cover;
  border-radius:14px;
  display:block;
  background:#eceff4;
}

.title{
  margin-top:10px;
  font-size:15px;
  line-height:1.4;
  font-weight:700;
  word-break:keep-all;
}

.no-result{
  display:none;
  margin-top:18px;
  padding:20px;
  text-align:center;
  background:#fff;
  border:1px solid #e2e2e2;
  border-radius:16px;
  color:#666;
  font-size:15px;
}

/* 태블릿 정도 */
@media (max-width:900px){
  .grid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}

/* 일반 모바일 */
@media (max-width:600px){
  body{
    padding:18px;
  }

  h1{
    font-size:26px;
  }

  .grid{
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
  }

  .card{
    padding:10px;
    border-radius:16px;
  }

  .title{
    font-size:13px;
  }
}

/* 갤럭시 S25(360px)보다 작은 화면 */
@media (max-width:359px){
  .grid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}
</style>
</head>
<body>

<div class="wrap">
  <h1>JLS Vocabulary</h1>
  <p class="desc">교재를 눌러 챕터 목록으로 이동하세요.</p>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      class="search"
      placeholder="교재 검색 (예: money, explorer, charity)"
      oninput="filterBooks()"
    >
  </div>

  <div class="grid" id="bookGrid">

    <a class="card" href="money_charity_foundation.html" data-title="Money & Charity Foundation">
      <img class="thumb" src="money_charity_foundation.jpg" alt="Money & Charity Foundation">
      <div class="title">Money & Charity Foundation</div>
    </a>

    <a class="card" href="environment_explorer.html" data-title="Environment Explorer">
      <img class="thumb" src="environment_explorer.jpg" alt="Environment Explorer">
      <div class="title">Environment Explorer</div>
    </a>

    <a class="card" href="science_discovery.html" data-title="Science Discovery">
      <img class="thumb" src="science_discovery.jpg" alt="Science Discovery">
      <div class="title">Science Discovery</div>
    </a>

    <a class="card" href="history_adventure.html" data-title="History Adventure">
      <img class="thumb" src="history_adventure.jpg" alt="History Adventure">
      <div class="title">History Adventure</div>
    </a>

    <a class="card" href="art_and_culture.html" data-title="Art and Culture">
      <img class="thumb" src="art_and_culture.jpg" alt="Art and Culture">
      <div class="title">Art and Culture</div>
    </a>

    <a class="card" href="reading_master.html" data-title="Reading Master">
      <img class="thumb" src="reading_master.jpg" alt="Reading Master">
      <div class="title">Reading Master</div>
    </a>

    <a class="card" href="grammar_build_up.html" data-title="Grammar Build Up">
      <img class="thumb" src="grammar_build_up.jpg" alt="Grammar Build Up">
      <div class="title">Grammar Build Up</div>
    </a>

    <a class="card" href="world_topics.html" data-title="World Topics">
      <img class="thumb" src="world_topics.jpg" alt="World Topics">
      <div class="title">World Topics</div>
    </a>

  </div>

  <div class="no-result" id="noResult">
    검색 결과가 없습니다.
  </div>
</div>

<script>
function filterBooks(){
  const input = document.getElementById('searchInput').value.toLowerCase().trim();
  const cards = document.querySelectorAll('#bookGrid .card');
  const noResult = document.getElementById('noResult');
  let visibleCount = 0;

  cards.forEach(card => {
    const title = card.dataset.title.toLowerCase();

    if(title.includes(input)){
      card.style.display = 'block';
      visibleCount++;
    }else{
      card.style.display = 'none';
    }
  });

  noResult.style.display = visibleCount === 0 ? 'block' : 'none';
}
</script>

</body>
</html>
