<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLS 활용독해 단어장</title>

<style>
body{
font-family:Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h1{
margin-top:0;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d9d9d9;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

/* 태블릿 */
@media (max-width:1024px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

/* 모바일 */
@media (max-width:600px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

.card{
background:white;
border-radius:16px;
padding:12px;
border:1px solid #e3e3e3;
text-decoration:none;
color:black;
display:block;
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:10px;
display:block;
}

.title{
font-size:14px;
font-weight:bold;
line-height:1.4;
}
</style>
</head>

<body>

<h1>Vocabulary Books</h1>

<div class="search-box">
<input type="text" id="search" placeholder="교재 검색 (예: money)">
</div>

<div class="grid" id="grid">

<a class="card" data-name="environment expert" href="./Environment-Expert/index.html">
<img src="./images/environment-expert.jpg" alt="Environment Expert">
<div class="title">Environment Expert</div>
</a>

<a class="card" data-name="environment explorer" href="./Environment-Explorer/index.html">
<img src="./images/Environment-Explorer.jpg" alt="Environment Explorer">
<div class="title">Environment Explorer</div>
</a>

<a class="card" data-name="global affairs explorer" href="./Global-Affairs-Explorer/index.html">
<img src="./images/Global-Affairs-Explorer.jpg" alt="Global Affairs Explorer">
<div class="title">Global Affairs Explorer</div>
</a>

<a class="card" data-name="money charity foundation" href="./Money-Charity-Foundation/index.html">
<img src="./images/Money-Charity-Foundation.png" alt="Money & Charity Foundation">
<div class="title">Money & Charity Foundation</div>
</a>

<a class="card" data-name="pollution environmental technology foundation" href="./Pollution-Environmental-Technology-Foundation/index.html">
<img src="./images/Pollution-Environmental-Technology-Foundation.png" alt="Pollution Environmental Technology Foundation">
<div class="title">Pollution Environmental Technology Foundation</div>
</a>

<a class="card" data-name="social issue explorer" href="./Social-Issue-Explorer/index.html">
<img src="./images/Social-Issues-Explorer.jpg" alt="Social Issue Explorer">
<div class="title">Social Issue Explorer</div>
</a>

<a class="card" data-name="art architecture foundation" href="./art-architecture-foundation/index.html">
<img src="./images/Art-Architecture-Foundation.png" alt="Art Architecture Foundation">
<div class="title">Art Architecture Foundation</div>
</a>

</div>

<script>
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", function(){
let value = this.value.toLowerCase();

cards.forEach(card=>{
let name = card.dataset.name;

if(name.includes(value)){
card.style.display = "block";
}else{
card.style.display = "none";
}
});
});
</script>

</body>
</html>
